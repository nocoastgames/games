<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON RACER - MEGA BOOST</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #00FFFF; font-size: 30px; font-weight: bold; z-index: 50; }
        h1 { color: #00FFFF; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START RACING</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Tap to VROOM!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #00FFFF; font-size: 80px; margin: 0;">CHAMPION!</h2>
        <p style="color: white; font-size: 30px;">5 LAPS COMPLETE!</p>
    </div>

    <div id="hud">Lap: 1/5</div>
    <canvas id="gameCanvas"></canvas>
    <h1>NEON RACER</h1>

    <audio id="bg-beat" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgBeat = document.getElementById('bg-beat');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        
        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 100;

        // Racer State
        let car = { x: -200, y: 0, speed: 0, targetY: 0, boost: 1 };
        let laps = 1;
        let trackPos = 0;
        let particles = [], lasers = [];
        let themeHue = 180; // Cyan start

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height / 2;
            car.targetY = car.y;
            bgBeat.volume = 0.2;
            bgBeat.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted || gameState === "win") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- THE ACTION ---
            car.speed += 25; // Big burst of speed
            car.boost = 1.8; // Car grows when boosting
            
            playRevSound();
            flashScreen(`hsla(${themeHue}, 100%, 50%, 0.3)`, 100);
        }

        function playRevSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            // Sliding pitch up for "VROOM"
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
            
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }

        function flashScreen(color, time) {
            flash.style.backgroundColor = color;
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, time);
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                // Physics
                car.x += car.speed;
                car.speed *= 0.96; // Friction (slows down over time)
                if (car.boost > 1) car.boost -= 0.05;

                // Move Track (illusion of speed)
                trackPos -= car.speed;

                // Check for Lap Complete
                if (car.x > canvas.width + 200) {
                    car.x = -200;
                    laps++;
                    themeHue = (themeHue + 60) % 360; // Change world color
                    if (laps > 5) {
                        winSequence();
                    } else {
                        hud.innerText = `Lap: ${laps}/5`;
                        playSynthWin();
                    }
                }
            }

            drawTrack();
            drawCar();
            drawEffects();

            requestAnimationFrame(gameLoop);
        }

        function drawTrack() {
            // Draw Road Lines
            ctx.strokeStyle = `hsla(${themeHue}, 100%, 50%, 0.5)`;
            ctx.lineWidth = 10;
            ctx.setLineDash([60, 40]);
            ctx.lineDashOffset = trackPos;
            
            ctx.beginPath();
            ctx.moveTo(0, canvas.height * 0.3);
            ctx.lineTo(canvas.width, canvas.height * 0.3);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, canvas.height * 0.7);
            ctx.lineTo(canvas.width, canvas.height * 0.7);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawCar() {
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.scale(car.boost, car.boost);

            // Car Body
            ctx.fillStyle = `hsl(${themeHue}, 100%, 50%)`;
            ctx.shadowBlur = 20; ctx.shadowColor = `hsl(${themeHue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.roundRect(-80, -40, 160, 80, 20);
            ctx.fill();

            // Cockpit
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.roundRect(-30, -25, 70, 50, 10);
            ctx.fill();

            // Headlights
            ctx.fillStyle = "white";
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.fillRect(60, -35, 20, 15);
            ctx.fillRect(60, 20, 20, 15);

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function winSequence() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynthWin();
            
            let winTimer = setInterval(() => {
                megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 300);

            setTimeout(() => {
                clearInterval(winTimer);
                laps = 1;
                hud.innerText = `Lap: ${laps}/5`;
                car.x = -200;
                car.speed = 0;
                gameState = "play";
                winOverlay.style.display = 'none';
            }, 6000);
        }

        function megaCelebration(x, y) {
            flashScreen("white", 150);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: (i * 45) * Math.PI/180, life: 1});
            for(let i=0; i<20; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5) * 30, vy: (Math.random()-0.5) * 30, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`
            });
        }

        function playSynthWin() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `hsla(${themeHue}, 100%, 70%, ${l.life})`;
                ctx.lineWidth = 20 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000);
                ctx.stroke();
                l.life -= 0.03;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            lasers = lasers.filter(l => l.life > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }
    </script>
</body>
</html>
