<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON RACER - ACCESSIBILITY EDITION</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; pointer-events: none; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #FFD700;
            background: transparent; color: #FFD700; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #FFD700;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #FFD700; font-size: 30px; font-weight: bold; z-index: 50; }
        h1 { color: #FFD700; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START RACING</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Pump Switch for Speed!)</p>
    </div>

    <div id="win-overlay">
        <h2 id="win-title" style="color: #FFD700; font-size: 80px; margin: 0;">CHAMPION!</h2>
        <p style="color: white; font-size: 30px;">5 LAPS COMPLETE!</p>
    </div>

    <div id="hud">Lap: 0/5</div>
    <canvas id="gameCanvas"></canvas>
    <h1>OVAL CIRCUIT</h1>

    <!-- UNIQUE RACING BACKGROUND MUSIC -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        const bgMusic = document.getElementById('bg-music');
        
        // --- SENSORY MODE CHECK ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 120;

        let car = { angle: 0, speed: 0, boost: 1 };
        let laps = 0;
        let themeHue = 180; 
        let ovalW, ovalH;
        let particles = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgMusic.volume = 0.2;
            bgMusic.play();
            resize();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ovalW = canvas.width * 0.35;
            ovalH = canvas.height * 0.3;
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState === "win") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            car.speed += 0.08; 
            car.boost = 1.6;
            
            playRevSound();
            
            // Only flash in High Sensory mode
            if (!lowSensoryMode) {
                flashScreen(`hsla(${themeHue}, 100%, 50%, 0.3)`, 80);
            }
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function playRevSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(100 + (car.speed * 500), now);
            osc.frequency.exponentialRampToValueAtTime(400 + (car.speed * 500), now + 0.15);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        }

        function flashScreen(color, time) {
            if (lowSensoryMode) return;
            flash.style.backgroundColor = color;
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, time);
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                let oldAngle = car.angle;
                car.angle += car.speed;
                car.speed *= 0.97; 
                if (car.boost > 1) car.boost -= 0.05;

                if (oldAngle < Math.PI * 2 && car.angle >= Math.PI * 2) {
                    car.angle -= Math.PI * 2;
                    crossFinishLine();
                }
            }

            drawTrack();
            drawFinishLine();
            drawCar();
            drawEffects();

            requestAnimationFrame(gameLoop);
        }

        function crossFinishLine() {
            laps++;
            themeHue = (themeHue + 70) % 360; 
            hud.style.color = `hsl(${themeHue}, 100%, 50%)`;
            
            if (laps >= 5) {
                winSequence();
            } else {
                hud.innerText = `Lap: ${laps}/5`;
                playWinSynth();
                megaCelebration(canvas.width/2 + ovalW, canvas.height/2);
            }
        }

        function drawTrack() {
            ctx.strokeStyle = `hsl(${themeHue}, 100%, 50%)`;
            ctx.lineWidth = 80;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.ellipse(canvas.width/2, canvas.height/2, ovalW, ovalH, 0, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = "black";
            ctx.lineWidth = 60;
            ctx.stroke();
            
            ctx.strokeStyle = `hsl(${themeHue}, 100%, 80%)`;
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function drawFinishLine() {
            const fx = canvas.width/2 + ovalW;
            const fy = canvas.height/2;
            const size = 80;
            ctx.save();
            ctx.translate(fx, fy);
            const rows = 4; const cols = 2;
            const step = size / rows;
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "white" : "black";
                    ctx.fillRect(c * (size/2) - size/2, r * step - size/2, size/2, step);
                }
            }
            ctx.restore();
        }

        function drawCar() {
            const cx = canvas.width/2 + Math.cos(car.angle) * ovalW;
            const cy = canvas.height/2 + Math.sin(car.angle) * ovalH;
            const tx = -ovalW * Math.sin(car.angle);
            const ty = ovalH * Math.cos(car.angle);
            const rotation = Math.atan2(ty, tx);

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);
            ctx.scale(car.boost, car.boost);

            ctx.fillStyle = `hsl(${themeHue}, 100%, 50%)`;
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.roundRect(-30, -20, 60, 40, 10); ctx.fill();
            
            ctx.fillStyle = "black";
            ctx.fillRect(-10, -12, 25, 24);

            ctx.fillStyle = `hsl(${themeHue}, 100%, 30%)`;
            ctx.fillRect(-35, -18, 10, 36);

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function winSequence() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            document.getElementById('win-title').style.color = `hsl(${themeHue}, 100%, 50%)`;
            
            let winTimer = setInterval(() => {
                megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
                playWinSynth();
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                laps = 0;
                hud.innerText = `Lap: 0/5`;
                car.angle = 0;
                car.speed = 0;
                gameState = "play";
                winOverlay.style.display = 'none';
            }, 6000);
        }

        function megaCelebration(x, y) {
            if (lowSensoryMode) return; 
            flashScreen("white", 150);
            for(let i=0; i<10; i++) lasers.push({x: x, y: y, angle: Math.random() * Math.PI * 2, life: 1});
            for(let i=0; i<25; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5) * 20, vy: (Math.random()-0.5) * 20, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`
            });
        }

        function playWinSynth() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `hsla(${themeHue}, 100%, 70%, ${l.life})`;
                ctx.lineWidth = 15 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.lineTo + Math.sin(l.angle) * 2000); ctx.stroke();
                l.life -= 0.03;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            lasers = lasers.filter(l => l.life > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }

        window.onresize = resize;
    </script>
</body>
</html>
