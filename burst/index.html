<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON BURST - PRO</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        /* UNOBTRUSIVE HOME */
        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 12px; opacity: 0.3; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.2); }

        /* PRO START BUTTON */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500;
        }
        .btn-start {
            font-size: 40px; padding: 25px 50px; border: 4px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,255,0.3);
            transition: 0.2s;
        }
        .btn-start:hover { background: #00FFFF; color: #000; }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #00FFFF; font-size: 24px; font-weight: bold; opacity: 0.5; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay">
        <button class="btn-start" onclick="startEngine(event)">START BURST</button>
        <p style="color: #666; margin-top: 20px; letter-spacing: 1px;">PHASE 1: SENSORY AGENCY</p>
    </div>

    <div id="hud">TOTAL HITS: <span id="hit-count">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        const hitDisplay = document.getElementById('hit-count');
        
        // --- PRO HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let lastPressTime = 0, cooldown = 250;
        let shapes = [];
        let shake = 0;
        let sessionHits = 0;

        function startEngine(e) {
            if(e) e.stopPropagation();
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) {
                    bgMusic.volume = 0.15;
                    bgMusic.play().catch(err => console.log("Audio block"));
                }
            } catch (err) {}

            resize();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (!isStarted) return;
            if (event.target.id === 'home-button' || event.target.className === 'btn-start') return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- DATA COLLECTION ---
            sessionHits++;
            hitDisplay.innerText = sessionHits;
            
            // Log to Global Stats for Hub Sidebar
            let totalS = parseInt(localStorage.getItem('statSuccess') || 0);
            localStorage.setItem('statSuccess', totalS + 1);

            triggerBurst();
        }

        function triggerBurst() {
            createMegaBurst();
            playImpactSound();
            
            if (!lowSensoryMode) {
                shake = 25;
                flash.style.backgroundColor = "white";
                flash.style.opacity = 0.3;
                setTimeout(() => flash.style.opacity = 0, 80);
            }

            if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
        }

        function createMegaBurst() {
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const hue = Math.random() * 360;
            const style = Math.floor(Math.random() * 4);

            if (style === 0) { // SPIKES
                for(let i=0; i<16; i++) {
                    shapes.push({ type: 'spike', x, y, angle: (i/16)*Math.PI*2, len: 0, targetLen: canvas.width, c: `hsl(${hue}, 100%, 50%)`, life: 1 });
                }
            } else if (style === 1) { // RINGS
                for(let i=0; i<3; i++) {
                    shapes.push({ type: 'ring', x, y, r: 0, targetR: (i+1)*400, c: `hsl(${hue}, 100%, 60%)`, life: 1 });
                }
            } else if (style === 2) { // PARTICLES
                for(let i=0; i<40; i++) {
                    shapes.push({ type: 'particle', x, y, vx: (Math.random()-0.5)*60, vy: (Math.random()-0.5)*60, s: Math.random()*40+10, c: `hsl(${hue}, 100%, 70%)`, life: 1 });
                }
            } else { // VORTEX
                for(let i=0; i<25; i++) {
                    shapes.push({ type: 'vortex', x, y, angle: Math.random()*Math.PI*2, dist: 0, targetDist: 600, rot: 0, c: `hsl(${hue}, 100%, 50%)`, life: 1 });
                }
            }
        }

        function playImpactSound() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.start(); osc.stop(now + 0.5);
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (shake > 0) shake *= 0.9;
            ctx.save();
            if (shake > 0.5) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);

            shapes.forEach((s) => {
                ctx.globalAlpha = s.life;
                ctx.strokeStyle = s.c;
                ctx.fillStyle = s.c;
                ctx.lineWidth = 20;
                ctx.lineCap = 'round';

                if (s.type === 'spike') {
                    s.len += (s.targetLen - s.len) * 0.12;
                    ctx.beginPath(); ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x + Math.cos(s.angle)*s.len, s.y + Math.sin(s.angle)*s.len);
                    ctx.stroke();
                } 
                else if (s.type === 'ring') {
                    s.r += (s.targetR - s.r) * 0.1;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
                }
                else if (s.type === 'vortex') {
                    s.dist += (s.targetDist - s.dist) * 0.05;
                    s.rot += 0.15;
                    const vx = s.x + Math.cos(s.angle + s.rot) * s.dist;
                    const vy = s.y + Math.sin(s.angle + s.rot) * s.dist;
                    ctx.beginPath(); ctx.arc(vx, vy, 20, 0, Math.PI*2); ctx.fill();
                }
                else if (s.type === 'particle') {
                    s.x += s.vx; s.y += s.vy;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                }
                s.life -= 0.02;
            });

            shapes = shapes.filter(s => s.life > 0);
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
    </script>
</body>
</html>
