<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON BURST - SUPERNOVA</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FFFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        h1 { color: #FFF; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.2; pointer-events: none; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">ENGAGE BURST</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Every tap is a massive reward!)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>SUPERNOVA</h1>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        
        // --- HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let lastPressTime = 0, cooldown = 250;
        let shapes = [];
        let shake = 0;
        let mistStars = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            resize();
            
            bgMusic.volume = isMuted ? 0 : 0.15;
            bgMusic.play();

            // Create background mist
            for(let i=0; i<50; i++) {
                mistStars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, a: Math.random()});
            }

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            createMegaBurst();
            playImpactSound();
            
            if (!lowSensoryMode) {
                shake = 20;
                flash.style.backgroundColor = "white";
                flash.style.opacity = 0.4;
                setTimeout(() => flash.style.opacity = 0, 80);
            }

            if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
        }

        function createMegaBurst() {
            const x = canvas.width / 2 + (Math.random()*100 - 50);
            const y = canvas.height / 2 + (Math.random()*100 - 50);
            const hue = Math.random() * 360;
            const style = Math.floor(Math.random() * 5);

            if (style === 0) { // SPIKES
                for(let i=0; i<16; i++) {
                    shapes.push({ type: 'spike', x, y, angle: (i/16)*Math.PI*2, len: 0, targetLen: canvas.width, c: `hsl(${hue}, 100%, 50%)`, life: 1 });
                }
            } else if (style === 1) { // RINGS
                for(let i=0; i<4; i++) {
                    shapes.push({ type: 'ring', x, y, r: 0, targetR: (i+1)*300, c: `hsl(${hue}, 100%, 60%)`, life: 1, lw: 20 });
                }
            } else if (style === 2) { // VORTEX
                for(let i=0; i<20; i++) {
                    shapes.push({ type: 'vortex', x, y, angle: Math.random()*Math.PI*2, dist: 0, targetDist: 500, rot: 0, c: `hsl(${hue}, 100%, 50%)`, life: 1 });
                }
            } else if (style === 3) { // STARFIELD
                for(let i=0; i<40; i++) {
                    shapes.push({ type: 'particle', x, y, vx: (Math.random()-0.5)*50, vy: (Math.random()-0.5)*50, s: Math.random()*30+10, c: `hsl(${hue}, 100%, 70%)`, life: 1 });
                }
            } else { // DIAMONDS
                for(let i=0; i<8; i++) {
                    shapes.push({ type: 'diamond', x, y, angle: (i/8)*Math.PI*2, dist: 0, s: 0, c: `hsl(${hue}, 100%, 50%)`, life: 1 });
                }
            }
        }

        function playImpactSound() {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, now);
            osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(); osc.stop(now + 0.4);

            // Shimmer hit
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(1000, now);
            osc2.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain2.gain.setValueAtTime(0.2, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc2.start(); osc2.stop(now + 0.1);
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (shake > 0) shake *= 0.9;

            ctx.save();
            if (shake > 0.5) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);

            // Draw Background Mist
            mistStars.forEach(s => {
                s.a += (Math.random()-0.5)*0.05;
                ctx.globalAlpha = Math.max(0.1, Math.min(0.4, s.a));
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });

            shapes.forEach((s) => {
                ctx.globalAlpha = s.life;
                ctx.strokeStyle = s.c;
                ctx.fillStyle = s.c;
                ctx.lineWidth = 15;
                ctx.lineCap = 'round';

                if (s.type === 'spike') {
                    s.len += (s.targetLen - s.len) * 0.1;
                    ctx.beginPath(); ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x + Math.cos(s.angle)*s.len, s.y + Math.sin(s.angle)*s.len);
                    ctx.stroke();
                } 
                else if (s.type === 'ring') {
                    s.r += (s.targetR - s.r) * 0.1;
                    ctx.lineWidth = s.lw * s.life;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
                }
                else if (s.type === 'vortex') {
                    s.dist += (s.targetDist - s.dist) * 0.05;
                    s.rot += 0.1;
                    const vx = s.x + Math.cos(s.angle + s.rot) * s.dist;
                    const vy = s.y + Math.sin(s.angle + s.rot) * s.dist;
                    ctx.beginPath(); ctx.arc(vx, vy, 20, 0, Math.PI*2); ctx.fill();
                }
                else if (s.type === 'particle') {
                    s.x += s.vx; s.y += s.vy;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                }
                else if (s.type === 'diamond') {
                    s.dist += 15; s.s += 2;
                    ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle);
                    ctx.strokeRect(s.dist, 0, s.s, s.s); ctx.restore();
                }

                s.life -= 0.02;
            });

            shapes = shapes.filter(s => s.life > 0);
            ctx.restore();
            ctx.globalAlpha = 1;
            requestAnimationFrame(gameLoop);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
    </script>
</body>
</html>
