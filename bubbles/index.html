<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUBBLE POP - PRO</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        /* UNOBTRUSIVE HOME */
        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 12px; opacity: 0.3; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.2); }

        /* PRO START BUTTON */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500;
        }
        .btn-start {
            font-size: 40px; padding: 25px 50px; border: 4px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,255,0.3);
            transition: 0.2s;
        }
        .btn-start:hover { background: #00FFFF; color: #000; }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #00FFFF; font-size: 24px; font-weight: bold; opacity: 0.5; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay">
        <button class="btn-start" onclick="startEngine(event)">START BUBBLES</button>
        <p style="color: #666; margin-top: 20px; letter-spacing: 1px;">PHASE 1: VISUAL TRACKING</p>
    </div>

    <div id="hud">TOTAL POPS: <span id="hit-count">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        const hitDisplay = document.getElementById('hit-count');
        
        // --- PRO HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let lastPressTime = 0, cooldown = 200;
        let bubbles = [], particles = [];
        let sessionHits = 0;

        function startEngine(e) {
            if(e) e.stopPropagation();
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) {
                    bgMusic.volume = 0.15;
                    bgMusic.play().catch(err => console.log("Audio block"));
                }
            } catch (err) {}

            resize();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (!isStarted) return;
            if (event.target.id === 'home-button' || event.target.className === 'btn-start') return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- DATA COLLECTION ---
            sessionHits++;
            hitDisplay.innerText = sessionHits;
            let totalS = parseInt(localStorage.getItem('statSuccess') || 0);
            localStorage.setItem('statSuccess', totalS + 1);

            spawnBubble();
            playPopSound();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function spawnBubble() {
            const size = 100 + Math.random() * 150;
            bubbles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + size,
                targetY: Math.random() * (canvas.height * 0.6),
                size: size,
                hue: Math.random() * 360,
                wobble: 0,
                wobbleSpeed: 0.05 + Math.random() * 0.1,
                popped: false
            });
        }

        function playPopSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(400 + Math.random()*200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        }

        function triggerPopVisual(x, y, hue) {
            if (!lowSensoryMode) {
                flash.style.backgroundColor = `hsla(${hue}, 100%, 50%, 0.2)`;
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 100);
            }
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5) * 15,
                    vy: (Math.random()-0.5) * 15,
                    s: 5 + Math.random() * 8,
                    color: `hsl(${hue}, 100%, 70%)`,
                    life: 1
                });
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#000510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            bubbles.forEach((b) => {
                b.y -= (b.y - b.targetY) * 0.05;
                b.wobble += b.wobbleSpeed;
                if (Math.abs(b.y - b.targetY) < 10 && !b.popped) {
                    b.popped = true;
                    triggerPopVisual(b.x, b.y, b.hue);
                    playPopSound();
                }
                if (!b.popped) drawBubble(b);
            });
            bubbles = bubbles.filter(b => !b.popped);

            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.2;
                p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;

            requestAnimationFrame(gameLoop);
        }

        function drawBubble(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            const scaleX = 1 + Math.sin(b.wobble) * 0.05;
            const scaleY = 1 + Math.cos(b.wobble) * 0.05;
            ctx.scale(scaleX, scaleY);
            const grd = ctx.createRadialGradient(0, 0, b.size * 0.5, 0, 0, b.size);
            grd.addColorStop(0, `hsla(${b.hue}, 80%, 50%, 0.1)`);
            grd.addColorStop(0.8, `hsla(${b.hue + 40}, 100%, 70%, 0.3)`);
            grd.addColorStop(1, `hsla(${b.hue + 80}, 100%, 80%, 0.6)`);
            ctx.fillStyle = grd;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, b.size, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.restore();
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
    </script>
</body>
</html>
