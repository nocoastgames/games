<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUBBLE POP - DYNAMIC MODE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FFFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        h1 { color: #00FFFF; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START BUBBLES</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Tap to make Magic Bubbles!)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>BUBBLE POP</h1>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        
        // --- HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let lastPressTime = 0, cooldown = 200;
        let bubbles = [];
        let particles = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            bgMusic.volume = isMuted ? 0 : 0.2;
            bgMusic.play();

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            spawnBubble();
            playPopSound();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function spawnBubble() {
            const size = 100 + Math.random() * 150;
            bubbles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + size,
                targetY: Math.random() * (canvas.height * 0.6),
                size: size,
                hue: Math.random() * 360,
                wobble: 0,
                wobbleSpeed: 0.05 + Math.random() * 0.1,
                life: 1,
                popped: false
            });
        }

        function playPopSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            osc.frequency.setValueAtTime(400 + Math.random()*200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        }

        function triggerPopVisual(x, y, hue) {
            if (!lowSensoryMode) {
                flash.style.backgroundColor = `hsla(${hue}, 100%, 50%, 0.2)`;
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 100);
            }

            // Spawn confetti stars
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5) * 15,
                    vy: (Math.random()-0.5) * 15,
                    s: 5 + Math.random() * 8,
                    color: `hsl(${hue}, 100%, 70%)`,
                    life: 1
                });
            }
        }

        function gameLoop() {
            // Dark blue watery background
            ctx.fillStyle = '#000510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Update & Draw Bubbles
            bubbles.forEach((b, i) => {
                b.y -= (b.y - b.targetY) * 0.05; // Float up to target
                b.wobble += b.wobbleSpeed;
                
                // Pop automatically if it reaches target or gets too old
                if (Math.abs(b.y - b.targetY) < 10 && !b.popped) {
                    b.popped = true;
                    triggerPopVisual(b.x, b.y, b.hue);
                    playPopSound();
                }

                if (!b.popped) {
                    drawBubble(b);
                }
            });
            bubbles = bubbles.filter(b => !b.popped);

            // 2. Update & Draw Particles
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
                p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;

            requestAnimationFrame(gameLoop);
        }

        function drawBubble(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            
            // Wobble effect
            const scaleX = 1 + Math.sin(b.wobble) * 0.05;
            const scaleY = 1 + Math.cos(b.wobble) * 0.05;
            ctx.scale(scaleX, scaleY);

            // The Soap Film (Iridescent Gradient)
            const grd = ctx.createRadialGradient(0, 0, b.size * 0.5, 0, 0, b.size);
            grd.addColorStop(0, `hsla(${b.hue}, 80%, 50%, 0.1)`);
            grd.addColorStop(0.8, `hsla(${b.hue + 40}, 100%, 70%, 0.3)`);
            grd.addColorStop(1, `hsla(${b.hue + 80}, 100%, 80%, 0.6)`);

            ctx.fillStyle = grd;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.arc(0, 0, b.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Specular Highlight (Light reflection)
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.beginPath();
            ctx.arc(-b.size * 0.4, -b.size * 0.4, b.size * 0.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
