<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ PARTY - NEON STAGE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FFFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        /* STAGE ELEMENTS */
        .speaker {
            position: absolute; bottom: 10%; width: 15vw; height: 40vh;
            background: #111; border: 5px solid #333; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .speaker-left { left: 5%; }
        .speaker-right { right: 5%; }
        .cone {
            width: 80%; padding-top: 80%; border-radius: 50%;
            background: radial-gradient(circle, #222 30%, #000 70%);
            border: 4px solid #444; transition: transform 0.1s;
        }

        #dj-booth {
            font-size: 220px; z-index: 50; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #00FFFF; font-size: 24px; opacity: 0.5; }
    </style>
</head>
<body onkeydown="handleInput(event)" onmousedown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START THE PARTY</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Every tap makes music!)</p>
    </div>

    <!-- SPEAKERS -->
    <div class="speaker speaker-left">
        <div class="cone" id="cone-l1"></div>
        <div class="cone" id="cone-l2"></div>
    </div>
    <div class="speaker speaker-right">
        <div class="cone" id="cone-r1"></div>
        <div class="cone" id="cone-r2"></div>
    </div>

    <div id="hud">Mode: TECHNO</div>
    <div id="dj-booth">🎧</div>

    <canvas id="stageLights"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('stageLights');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bg-music');
        const booth = document.getElementById('dj-booth');
        const flash = document.getElementById('flash');
        
        // --- HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let pressCount = 0;
        let currentBank = 0; // 0: Techno, 1: Funny, 2: Drumkit
        const bankNames = ["TECHNO", "FUNNY", "DRUMS"];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            bgMusic.volume = isMuted ? 0 : 0.15;
            bgMusic.play();

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            triggerDJEffect();
        }

        function triggerDJEffect() {
            pressCount++;
            if (pressCount % 10 === 0) {
                currentBank = (currentBank + 1) % 3;
                document.getElementById('hud').innerText = `Mode: ${bankNames[currentBank]}`;
            }

            // 1. Play Sound based on current bank
            playBankSound();

            // 2. Animate Booth (Spin/Zoom)
            const spin = (Math.random() - 0.5) * 60;
            booth.style.transform = `scale(1.5) rotate(${spin}deg)`;
            setTimeout(() => booth.style.transform = `scale(1) rotate(0deg)`, 100);

            // 3. Pulse Speakers
            document.querySelectorAll('.cone').forEach(c => {
                c.style.transform = "scale(1.2)";
                setTimeout(() => c.style.transform = "scale(1)", 100);
            });

            // 4. Visual Feedback
            if (!lowSensoryMode) {
                flash.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
                flash.style.opacity = 0.3;
                setTimeout(() => flash.style.opacity = 0, 80);
            }

            if (navigator.vibrate) navigator.vibrate(50);
        }

        function playBankSound() {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (currentBank === 0) { // TECHNO
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400 + Math.random()*400, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            } 
            else if (currentBank === 1) { // FUNNY
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100 + Math.random()*800, now);
                osc.frequency.quadraticCurveTo(1200, now + 0.1, 100, now + 0.3);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            }
            else { // DRUMS
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
                gain.gain.setValueAtTime(0.8, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            }

            osc.start(); osc.stop(now + 0.4);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!lowSensoryMode) {
                // Draw Stage Lights
                const time = Date.now() * 0.001;
                drawLight(canvas.width * 0.2, 0, time);
                drawLight(canvas.width * 0.8, 0, time * 1.2);
            }

            requestAnimationFrame(gameLoop);
        }

        function drawLight(x, y, t) {
            const angle = Math.sin(t) * 0.5;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grd.addColorStop(0, "rgba(0, 255, 255, 0.2)");
            grd.addColorStop(1, "transparent");
            
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-150, canvas.height);
            ctx.lineTo(150, canvas.height);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
