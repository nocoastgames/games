<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA ROCKET - BLAST OFF</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #FF4500;
            background: transparent; color: #FF4500; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #FF4500;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #FF4500; font-size: 30px; font-weight: bold; z-index: 50; }
        h1 { color: #FF4500; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">BUILD THE ROCKET</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(10 Taps to Launch!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #FF4500; font-size: 80px; margin: 0;">BLAST OFF!</h2>
        <p style="color: white; font-size: 30px;">SPACE EXPLORER!</p>
    </div>

    <div id="hud">Build: 0/10</div>
    <canvas id="gameCanvas"></canvas>
    <h1>MEGA ROCKET</h1>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        
        let audioCtx, isStarted = false, gameState = "build";
        let lastPressTime = 0, cooldown = 300;

        let pressCount = 0;
        let rocketY = 0;
        let shakeAmount = 0;
        let particles = [], lasers = [], stars = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            rocketY = canvas.height * 0.7;
            
            // Create static background stars
            for(let i=0; i<100; i++) {
                stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3});
            }

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted || gameState === "launch") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            pressCount++;
            hud.innerText = `Build: ${pressCount}/10`;

            if (pressCount < 4) {
                playSynth('clank', 0.5); // Building sound
            } else if (pressCount < 10) {
                shakeAmount = pressCount; // Start shaking
                playSynth('charge', 0.5); // Powering up
            } else {
                launchRocket(); // Final press
            }

            flashScreen("rgba(255, 69, 0, 0.3)", 100);
        }

        function flashScreen(color, time) {
            flash.style.backgroundColor = color;
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, time);
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'clank') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'charge') {
                osc.frequency.setValueAtTime(100 + (pressCount * 50), now);
                osc.frequency.linearRampToValueAtTime(300 + (pressCount * 50), now + 0.2);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'blast') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(60, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 1.5);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(); osc.stop(now + 1.5);
            }
        }

        function launchRocket() {
            gameState = "launch";
            winOverlay.style.display = 'flex';
            playSynth('blast', 0.8);
            
            // Start the Space Party
            let winTimer = setInterval(() => {
                megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                resetGame();
            }, 6000);
        }

        function resetGame() {
            pressCount = 0;
            gameState = "build";
            shakeAmount = 0;
            rocketY = canvas.height * 0.7;
            hud.innerText = `Build: 0/10`;
            winOverlay.style.display = 'none';
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Stars
            ctx.fillStyle = "white";
            stars.forEach(s => {
                if (gameState === "launch") s.y += 20; // Falling star effect
                if (s.y > canvas.height) s.y = 0;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });

            // Rocket Logic
            let currentX = canvas.width/2 + (Math.random() * shakeAmount - shakeAmount/2);
            if (gameState === "launch") {
                rocketY -= 15;
                spawnSmoke(currentX, rocketY + 100);
            }

            drawRocket(currentX, rocketY);
            drawEffects();

            requestAnimationFrame(gameLoop);
        }

        function drawRocket(x, y) {
            if (pressCount < 1) return;
            ctx.save();
            ctx.translate(x, y);

            // 1. Base (Taps 1-3)
            if (pressCount >= 1) {
                ctx.fillStyle = "#555";
                ctx.fillRect(-60, 40, 120, 40); // Fins/Engine
            }
            // 2. Body (Taps 2-3)
            if (pressCount >= 2) {
                ctx.fillStyle = "white";
                ctx.fillRect(-40, -60, 80, 120); // Main Body
                ctx.fillStyle = "#00FFFF";
                ctx.beginPath(); ctx.arc(0, -10, 15, 0, Math.PI*2); ctx.fill(); // Window
            }
            // 3. Nose (Tap 3)
            if (pressCount >= 3) {
                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.moveTo(-40, -60); ctx.lineTo(40, -60); ctx.lineTo(0, -130);
                ctx.closePath(); ctx.fill();
            }
            // 4. Glow/Ready (Taps 4-9)
            if (pressCount >= 4 && gameState === "build") {
                let glow = (Math.sin(Date.now() * 0.01) + 1) * 20;
                ctx.shadowBlur = glow;
                ctx.shadowColor = "orange";
                ctx.fillStyle = "orange";
                ctx.fillRect(-20, 60, 40, 20); // Fire nozzle
            }
            // 5. Engine Fire (Launch)
            if (gameState === "launch") {
                ctx.fillStyle = "orange";
                ctx.beginPath();
                ctx.moveTo(-30, 60); ctx.lineTo(30, 60); ctx.lineTo(0, 150);
                ctx.closePath(); ctx.fill();
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function spawnSmoke(x, y) {
            for(let i=0; i<3; i++) {
                particles.push({
                    x: x + (Math.random()*40-20), y: y, 
                    vx: (Math.random()-0.5)*5, vy: 5 + Math.random()*5, 
                    life: 1, color: "rgba(200,200,200,0.5)", s: 10 + Math.random()*20
                });
            }
        }

        function megaCelebration(x, y) {
            flashScreen("white", 150);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: (i * 45) * Math.PI/180, life: 1});
            for(let i=0; i<20; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5) * 20, vy: (Math.random()-0.5) * 20, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`, s: 10
            });
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(255, 69, 0, ${l.life})`;
                ctx.lineWidth = 15 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.lineTo + Math.sin(l.angle) * 2000); ctx.stroke();
                l.life -= 0.03;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            lasers = lasers.filter(l => l.life > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }
    </script>
</body>
</html>
