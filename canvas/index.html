<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CANVAS - GLOW & DRIP</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        /* UNOBTRUSIVE HOME */
        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 12px; opacity: 0.3; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.2); }

        /* PRO START BUTTON */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500;
        }
        .btn-start {
            font-size: 40px; padding: 25px 50px; border: 4px solid #FFFFFF;
            background: transparent; color: #FFFFFF; font-weight: bold;
            border-radius: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .btn-start:hover { background: #FFFFFF; color: #000; }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #FFF; font-size: 24px; font-weight: bold; opacity: 0.5; z-index: 50; }
        
        /* GALLERY FRAME */
        #frame {
            position: fixed; inset: 0; border: 0px solid gold; z-index: 300;
            pointer-events: none; transition: border-width 0.5s;
        }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>
    <div id="frame"></div>

    <div id="overlay">
        <button class="btn-start" onclick="startEngine(event)">START PAINTING</button>
        <p style="color: #666; margin-top: 20px; letter-spacing: 1px;">PHASE 1: CREATIVE AGENCY</p>
    </div>

    <div id="hud">ARTWORK: <span id="hit-count">0</span>%</div>
    <canvas id="mainCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
    </audio>

    <script>
        const mCanvas = document.getElementById('mainCanvas');
        const mCtx = mCanvas.getContext('2d');
        const fCanvas = document.getElementById('fxCanvas');
        const fCtx = fCanvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hitDisplay = document.getElementById('hit-count');
        const bgMusic = document.getElementById('bg-music');
        const frame = document.getElementById('frame');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 400;
        let splatCount = 0, squeegeeX = -400;
        
        const neonColors = ['#00FFFF', '#FF00FF', '#00FF00', '#FFFF00', '#FF4500', '#FF0000', '#FFFFFF'];
        let activeDrips = [];

        function startEngine(e) {
            if(e) e.stopPropagation();
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) {
                    bgMusic.volume = 0.15;
                    bgMusic.play().catch(err => console.log("Audio blocked"));
                }
            } catch (err) {}

            resize();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (!isStarted || gameState !== "play") return;
            if (event.target.id === 'home-button' || event.target.className === 'btn-start') return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            splatCount++;
            hitDisplay.innerText = splatCount * 10;
            
            // DATA LOG
            let totalS = parseInt(localStorage.getItem('statSuccess') || 0);
            localStorage.setItem('statSuccess', totalS + 1);

            triggerSplat();
        }

        function triggerSplat() {
            const x = Math.random() * mCanvas.width;
            const y = Math.random() * mCanvas.height;
            const color = neonColors[Math.floor(Math.random() * neonColors.length)];
            
            // Create Splat
            createOrganicBlob(mCtx, x, y, color, 150 + Math.random()*150);
            
            // Create Drips
            for(let i=0; i<3; i++) {
                activeDrips.push({
                    x: x + (Math.random()*100 - 50),
                    y: y,
                    speed: 0.5 + Math.random()*1.5,
                    size: 10 + Math.random()*15,
                    color: color,
                    life: 100 + Math.random()*200
                });
            }

            playSplatSound();
            if (!lowSensoryMode) {
                flash.style.backgroundColor = "rgba(255,255,255,0.1)";
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 50);
            }

            if (splatCount >= 10) triggerGalleryMode();
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function createOrganicBlob(ctx, x, y, color, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = color;
            ctx.globalCompositeOperation = "lighter"; // Makes overlaps glow white
            if (!lowSensoryMode) { ctx.shadowBlur = 40; ctx.shadowColor = color; }

            ctx.beginPath();
            const points = 12;
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const variance = 0.5 + Math.random() * 0.8;
                const tx = Math.cos(angle) * (size * variance);
                const ty = Math.sin(angle) * (size * variance);
                if (i === 0) ctx.moveTo(tx, ty);
                else ctx.quadraticCurveTo(0, 0, tx, ty);
            }
            ctx.fill();
            ctx.restore();
        }

        function playSplatSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function triggerGalleryMode() {
            gameState = "win";
            frame.style.borderWidth = "40px";
            speak("Bravo! It is a masterpiece!");
            setTimeout(() => {
                frame.style.borderWidth = "0px";
                startCleanup();
            }, 5000);
        }

        function speak(text) {
            if (isMuted) return;
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        function startCleanup() {
            squeegeeX = -400;
            gameState = "cleaning";
            if(!isMuted) playCleanupSound();
        }

        function playCleanupSound() {
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function gameLoop() {
            fCtx.clearRect(0,0, fCanvas.width, fCanvas.height);

            // 1. Process Gravity Drips
            activeDrips.forEach(d => {
                if (d.life > 0) {
                    d.y += d.speed;
                    d.life--;
                    mCtx.fillStyle = d.color;
                    mCtx.beginPath();
                    mCtx.arc(d.x, d.y, d.size * (d.life/200), 0, Math.PI*2);
                    mCtx.fill();
                }
            });

            // 2. Handle Cleanup
            if (gameState === "cleaning") {
                squeegeeX += 20;
                
                // Draw Squeegee Bot
                fCtx.fillStyle = "#333"; fCtx.fillRect(squeegeeX, 0, 150, fCanvas.height);
                fCtx.fillStyle = "white"; fCtx.fillRect(squeegeeX + 140, 0, 10, fCanvas.height);
                
                // Bot Eyes
                fCtx.fillStyle = "white";
                fCtx.beginPath(); fCtx.arc(squeegeeX + 75, fCanvas.height/2 - 40, 20, 0, Math.PI*2); fCtx.fill();
                fCtx.beginPath(); fCtx.arc(squeegeeX + 75, fCanvas.height/2 + 40, 20, 0, Math.PI*2); fCtx.fill();
                fCtx.fillStyle = "black";
                fCtx.beginPath(); fCtx.arc(squeegeeX + 82, fCanvas.height/2 - 40, 8, 0, Math.PI*2); fCtx.fill();
                fCtx.beginPath(); fCtx.arc(squeegeeX + 82, fCanvas.height/2 + 40, 8, 0, Math.PI*2); fCtx.fill();

                mCtx.fillStyle = "black"; mCtx.fillRect(squeegeeX - 50, 0, 150, mCanvas.height);

                if (squeegeeX > fCanvas.width + 400) {
                    splatCount = 0; hitDisplay.innerText = "0";
                    activeDrips = []; gameState = "play";
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function resize() {
            mCanvas.width = fCanvas.width = window.innerWidth;
            mCanvas.height = fCanvas.height = window.innerHeight;
            mCtx.fillStyle = "black"; mCtx.fillRect(0,0, mCanvas.width, mCanvas.height);
        }
        window.onresize = resize;
    </script>
</body>
</html>
