<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEED THE MONSTER - 3D MODE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; pointer-events: none; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #ccff00;
            background: transparent; color: #ccff00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #ccff00;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #ccff00; font-size: 30px; font-weight: bold; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">FEED THE MONSTER</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Slowly guide the food into the mouth!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #ccff00; font-size: 80px; margin: 0;">BURRRRRRP!</h2>
        <p style="color: white; font-size: 30px;">THE MONSTER IS FULL!</p>
    </div>

    <div id="hud">Snacks: 0/10</div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        const bgMusic = document.getElementById('bg-music');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 800;
        let snackCount = 0;
        
        let monsterScale = 1;
        let mouthOpen = 0; 
        let activeSnack = null;
        const snacks = ['🍕', '🍩', '🌮', '🍔', '🍦', '🍎', '🍰', '🍉', '🥨'];

        let particles = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgMusic.volume = 0.15; bgMusic.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState !== "play" || activeSnack) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            launchSnack();
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function launchSnack() {
            const emoji = snacks[Math.floor(Math.random() * snacks.length)];
            
            // Random direction from the edges
            const side = Math.floor(Math.random() * 4);
            let startX, startY;
            if(side === 0) { startX = Math.random()*canvas.width; startY = -100; } // Top
            else if(side === 1) { startX = Math.random()*canvas.width; startY = canvas.height+100; } // Bottom
            else if(side === 2) { startX = -100; startY = Math.random()*canvas.height; } // Left
            else { startX = canvas.width+100; startY = Math.random()*canvas.height; } // Right

            activeSnack = {
                emoji: emoji,
                x: startX,
                y: startY,
                startX: startX,
                startY: startY,
                targetX: canvas.width / 2,
                targetY: canvas.height * 0.55,
                progress: 0
            };
            playSynth('slide', 0.2);
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'slide') {
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.8);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(); osc.stop(now + 0.8);
            } else if (type === 'chomp') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'burp') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(40, now + 1.2);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                osc.start(); osc.stop(now + 1.2);
            }
        }

        function triggerWin() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynth('burp', 0.9);
            
            let winTimer = setInterval(() => {
                if (!lowSensoryMode) spawnVictory(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                snackCount = 0;
                hud.innerText = `Snacks: 0/10`;
                gameState = "play";
                winOverlay.style.display = 'none';
            }, 6000);
        }

        function spawnVictory(x, y) {
            if (lowSensoryMode) return;
            flash.style.backgroundColor = "white"; flash.style.opacity = 0.4;
            setTimeout(() => flash.style.opacity = 0, 100);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: Math.random()*Math.PI*2, life: 1});
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const mx = canvas.width / 2;
            const my = canvas.height * 0.5;

            // 1. Animate Snack (Slower Progress)
            if (activeSnack) {
                activeSnack.progress += 0.012; // Much Slower
                activeSnack.x = activeSnack.startX + (activeSnack.targetX - activeSnack.startX) * activeSnack.progress;
                activeSnack.y = activeSnack.startY + (activeSnack.targetY - activeSnack.startY) * activeSnack.progress;
                
                // Open mouth as it gets close
                mouthOpen = activeSnack.progress > 0.65 ? 1 : 0;

                if (activeSnack.progress >= 1) {
                    activeSnack = null;
                    snackCount++;
                    hud.innerText = `Snacks: ${snackCount}/10`;
                    mouthOpen = 0;
                    monsterScale = 1.6;
                    playSynth('chomp', 0.6);
                    if (snackCount >= 10) triggerWin();
                }
            }

            // 2. Monster Physics
            monsterScale += (1 - monsterScale) * 0.08;

            // 3. Draw Monster
            drawMonster(mx, my, monsterScale);

            // 4. Draw Snack with 3D Scaling
            if (activeSnack) {
                // Scale from 3.5x down to 0.4x to show depth
                let currentScale = 3.5 - (3.1 * activeSnack.progress);
                ctx.save();
                ctx.translate(activeSnack.x, activeSnack.y);
                ctx.scale(currentScale, currentScale);
                ctx.font = "60px Arial";
                ctx.textAlign = "center";
                ctx.fillText(activeSnack.emoji, 0, 0);
                ctx.restore();
            }

            drawEffects();
            requestAnimationFrame(gameLoop);
        }

        function drawMonster(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Fuzzy Spikes/Texture
            ctx.strokeStyle = "#ccff00";
            ctx.lineWidth = 10;
            for(let i=0; i<12; i++) {
                ctx.rotate(Math.PI/6);
                ctx.beginPath(); ctx.moveTo(140, 0); ctx.lineTo(170, 0); ctx.stroke();
            }

            // Body
            ctx.fillStyle = "#ccff00";
            ctx.shadowBlur = 40; ctx.shadowColor = "#ccff00";
            ctx.beginPath(); ctx.ellipse(0, 0, 160, 190, 0, 0, Math.PI * 2); ctx.fill();

            // Horns
            ctx.fillStyle = "#FFF";
            ctx.beginPath(); ctx.moveTo(-100, -140); ctx.lineTo(-140, -220); ctx.lineTo(-60, -160); ctx.fill();
            ctx.beginPath(); ctx.moveTo(100, -140); ctx.lineTo(140, -220); ctx.lineTo(60, -160); ctx.fill();

            // Eyes
            const eyeY = -80;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(-70, eyeY, 50, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(70, eyeY, 40, 0, Math.PI * 2); ctx.fill(); // Goofy uneven sizes
            
            // Pupils (Track Snack)
            ctx.fillStyle = "black";
            let lookX = 0, lookY = 0;
            if (activeSnack) {
                lookX = (activeSnack.x - canvas.width/2) * 0.05;
                lookY = (activeSnack.y - canvas.height/2) * 0.05;
            }
            ctx.beginPath(); ctx.arc(-70 + lookX, eyeY + lookY, 18, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(70 + lookX, eyeY + lookY, 14, 0, Math.PI * 2); ctx.fill();

            // Mouth
            if (mouthOpen > 0) {
                ctx.fillStyle = "#111";
                ctx.beginPath(); ctx.ellipse(0, 60, 90, 70, 0, 0, Math.PI * 2); ctx.fill();
                // Tongue
                ctx.fillStyle = "#ff0066";
                ctx.beginPath(); ctx.ellipse(0, 100, 40, 20, 0, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.strokeStyle = "black";
                ctx.lineWidth = 12; ctx.lineCap = "round";
                ctx.beginPath(); ctx.arc(0, 40, 60, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(204, 255, 0, ${l.life})`;
                ctx.lineWidth = 20 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2500, l.y + Math.sin(l.angle) * 2500);
                ctx.stroke();
                l.life -= 0.03;
            });
            lasers = lasers.filter(l => l.life > 0);
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
    </script>
</body>
</html>
