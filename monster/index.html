<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CANVAS - MASTERPIECE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        /* WIN OVERLAY */
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; pointer-events: none;
        }
        .bravo-text {
            color: #00FF00; font-size: 80px; text-shadow: 0 0 20px #00FF00;
            margin: 0; animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FF00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #hud { position: absolute; top: 20px; right: 20px; color: #FFF; font-size: 30px; font-weight: bold; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START PAINTING</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Fill the canvas with 10 splashes!)</p>
    </div>

    <div id="win-overlay">
        <p class="bravo-text">BRAVO!</p>
        <p style="color: white; font-size: 32px;">IT'S A MASTERPIECE!</p>
    </div>

    <div id="hud">Splats: 0/10</div>
    <canvas id="mainCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
    </audio>

    <script>
        const mCanvas = document.getElementById('mainCanvas');
        const mCtx = mCanvas.getContext('2d');
        const fCanvas = document.getElementById('fxCanvas');
        const fCtx = fCanvas.getContext('2d');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        const bgMusic = document.getElementById('bg-music');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';

        let audioCtx, isStarted = false, isCleaning = false, gameState = "play";
        let lastPressTime = 0, cooldown = 300;
        let splatCount = 0, squeegeeX = -200;

        const neonColors = ['#00FFFF', '#FF00FF', '#00FF00', '#FFFF00', '#FF4500', '#FF0000', '#FFFFFF'];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            resize();
            bgMusic.volume = 0.15; bgMusic.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            mCanvas.width = fCanvas.width = window.innerWidth;
            mCanvas.height = fCanvas.height = window.innerHeight;
            mCtx.fillStyle = "black"; mCtx.fillRect(0,0, mCanvas.width, mCanvas.height);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState !== "play") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            splatCount++;
            hud.innerText = `Splats: ${splatCount}/10`;
            
            // Create a "Mega Splat" (Multiple blobs per click)
            const centerX = Math.random() * mCanvas.width;
            const centerY = Math.random() * mCanvas.height;
            const color = neonColors[Math.floor(Math.random() * neonColors.length)];
            
            // 1. Main large blob
            createBlob(centerX, centerY, color, 150 + Math.random() * 150);
            
            // 2. Satellite blobs (Varying shapes)
            for(let i=0; i<5; i++) {
                const ox = (Math.random()-0.5) * 300;
                const oy = (Math.random()-0.5) * 300;
                createBlob(centerX + ox, centerY + oy, color, 40 + Math.random() * 80);
            }

            playSplatSound();
            if (navigator.vibrate) navigator.vibrate(60);

            if (splatCount >= 10) triggerVictory();
        }

        function createBlob(x, y, color, size) {
            mCtx.save();
            mCtx.translate(x, y);
            mCtx.fillStyle = color;
            mCtx.shadowBlur = 30; mCtx.shadowColor = color;

            mCtx.beginPath();
            const points = 8 + Math.floor(Math.random() * 8);
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const variance = 0.5 + Math.random() * 0.8;
                const tx = Math.cos(angle) * (size * variance);
                const ty = Math.sin(angle) * (size * variance);
                if (i === 0) mCtx.moveTo(tx, ty);
                else mCtx.quadraticCurveTo(0, 0, tx, ty);
            }
            mCtx.fill();
            
            // Add Drips
            if (Math.random() > 0.5) {
                mCtx.beginPath();
                mCtx.roundRect(-size/10, 0, size/5, size * (1 + Math.random()), 20);
                mCtx.fill();
            }
            mCtx.restore();
        }

        function playSplatSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150 + Math.random()*100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function triggerVictory() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            
            // Victory Fanfare
            const notes = [261, 329, 392, 523, 659];
            notes.forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime + i*0.1);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
                o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
            });

            setTimeout(() => {
                winOverlay.style.display = 'none';
                startCleanup();
            }, 3500);
        }

        function startCleanup() {
            isCleaning = true;
            squeegeeX = -300;
            // Cleaning sound (Hiss/Wash)
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o = audioCtx.createOscillator(); o.type = 'brown'; // Not supported in all, use noise buffer
            playCleanupSound();
        }

        function playCleanupSound() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
            noise.start();
        }

        function gameLoop() {
            fCtx.clearRect(0,0, fCanvas.width, fCanvas.height);

            if (isCleaning) {
                squeegeeX += 20;
                // Draw Squeegee
                fCtx.fillStyle = "#444"; fCtx.fillRect(squeegeeX, 0, 150, fCanvas.height);
                fCtx.fillStyle = "#FFF"; fCtx.fillRect(squeegeeX + 140, 0, 10, fCanvas.height);
                // Erase main canvas
                mCtx.fillStyle = "black"; mCtx.fillRect(squeegeeX - 50, 0, 100, mCanvas.height);

                if (squeegeeX > fCanvas.width + 300) {
                    isCleaning = false; splatCount = 0;
                    hud.innerText = `Splats: 0/10`; gameState = "play";
                }
            }
            requestAnimationFrame(gameLoop);
        }
        window.onresize = resize;
    </script>
</body>
</html>
