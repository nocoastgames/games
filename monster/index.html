<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEED THE MONSTER</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; pointer-events: none; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #ccff00;
            background: transparent; color: #ccff00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #ccff00;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #ccff00; font-size: 30px; font-weight: bold; z-index: 50; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">FEED THE MONSTER</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Tap to launch snacks!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #ccff00; font-size: 80px; margin: 0;">YUM YUM!</h2>
        <p style="color: white; font-size: 30px;">FULL TUMMY!</p>
    </div>

    <div id="hud">Snacks: 0/10</div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        const bgMusic = document.getElementById('bg-music');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 500;
        let snackCount = 0;
        
        let monsterScale = 1;
        let mouthOpen = 0; // 0 to 1
        let activeSnack = null;
        const snacks = ['🍕', '🍩', '🌮', '🍔', '🍦', '🍎', '🍰'];

        let particles = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgMusic.volume = 0.15; bgMusic.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState !== "play" || activeSnack) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            launchSnack();
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function launchSnack() {
            const emoji = snacks[Math.floor(Math.random() * snacks.length)];
            activeSnack = {
                emoji: emoji,
                y: canvas.height + 100,
                x: canvas.width / 2,
                targetY: canvas.height * 0.55,
                progress: 0
            };
            playSynth('slide', 0.3);
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'slide') {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.3);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'chomp') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'burp') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.5);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            }
        }

        function triggerWin() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynth('burp', 0.8);
            
            let winTimer = setInterval(() => {
                if (!lowSensoryMode) spawnVictory(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                snackCount = 0;
                hud.innerText = `Snacks: 0/10`;
                gameState = "play";
                winOverlay.style.display = 'none';
            }, 5000);
        }

        function spawnVictory(x, y) {
            if (lowSensoryMode) return;
            flash.style.backgroundColor = "white"; flash.style.opacity = 0.5;
            setTimeout(() => flash.style.opacity = 0, 100);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: Math.random()*Math.PI*2, life: 1});
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const mx = canvas.width / 2;
            const my = canvas.height * 0.5;

            // 1. Animate Snack
            if (activeSnack) {
                activeSnack.progress += 0.04;
                activeSnack.y = canvas.height - (canvas.height * 0.5 * activeSnack.progress);
                mouthOpen = activeSnack.progress > 0.7 ? 1 : 0;

                if (activeSnack.progress >= 1) {
                    activeSnack = null;
                    snackCount++;
                    hud.innerText = `Snacks: ${snackCount}/10`;
                    mouthOpen = 0;
                    monsterScale = 1.4;
                    playSynth('chomp', 0.5);
                    if (snackCount >= 10) triggerWin();
                }
            }

            // 2. Monster Bounce
            monsterScale += (1 - monsterScale) * 0.1;

            // 3. Draw Monster
            drawMonster(mx, my, monsterScale);

            // 4. Draw Snack
            if (activeSnack) {
                ctx.font = "80px Arial";
                ctx.textAlign = "center";
                ctx.fillText(activeSnack.emoji, activeSnack.x, activeSnack.y);
            }

            drawEffects();
            requestAnimationFrame(gameLoop);
        }

        function drawMonster(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Body
            ctx.fillStyle = "#ccff00"; // Neon Lime
            ctx.shadowBlur = 30; ctx.shadowColor = "#ccff00";
            ctx.beginPath();
            ctx.ellipse(0, 0, 150, 180, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(-60, -80, 45, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(60, -80, 45, 0, Math.PI * 2); ctx.fill();
            
            // Pupils
            ctx.fillStyle = "black";
            const eyeWiggle = Math.sin(Date.now() * 0.005) * 10;
            ctx.beginPath(); ctx.arc(-60 + eyeWiggle, -80, 15, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(60 + eyeWiggle, -80, 15, 0, Math.PI * 2); ctx.fill();

            // Mouth
            ctx.fillStyle = "#222";
            if (mouthOpen > 0) {
                ctx.beginPath();
                ctx.ellipse(0, 50, 80, 60, 0, 0, Math.PI * 2);
                ctx.fill();
                // Teeth
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.moveTo(-40, 20); ctx.lineTo(-20, 20); ctx.lineTo(-30, 45); ctx.fill();
                ctx.beginPath(); ctx.moveTo(40, 20); ctx.lineTo(20, 20); ctx.lineTo(30, 45); ctx.fill();
            } else {
                ctx.strokeStyle = "black";
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(0, 40, 50, 0.1 * Math.PI, 0.9 * Math.PI);
                ctx.stroke();
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(204, 255, 0, ${l.life})`;
                ctx.lineWidth = 15 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000);
                ctx.stroke();
                l.life -= 0.03;
            });
            lasers = lasers.filter(l => l.life > 0);
        }
    </script>
</body>
</html>
