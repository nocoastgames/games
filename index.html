<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Interaction Hub</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #fff; font-size: clamp(28px, 6vw, 52px); text-align: center; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 20px; text-align: center; }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; flex-grow: 1; align-content: start; }
        .game-card { background: #111; border-radius: 35px; padding: 35px 20px; text-align: center; text-decoration: none; transition: transform 0.25s; border: 5px solid transparent; display: flex; flex-direction: column; justify-content: center; }
        .game-card:hover { transform: scale(1.03); background: #1a1a1a; }
        .game-icon { font-size: 90px; margin-bottom: 15px; }
        .game-title { font-size: 30px; font-weight: bold; }
        
        .dj { border-color: #00FFFF; color: #00FFFF; }
        .bubbles { border-color: #FF00FF; color: #FF00FF; }
        .snake { border-color: #00FF00; color: #00FF00; }
        .loghop { border-color: #FF8C00; color: #FF8C00; }
        .racer { border-color: #FFD700; color: #FFD700; }
        .rocket { border-color: #FF4500; color: #FF4500; }

        /* SENSORY TOGGLE STYLING */
        .sensory-controls {
            background: #222; padding: 20px; border-radius: 20px; margin-bottom: 30px;
            border: 2px solid #555; display: flex; align-items: center; gap: 15px;
        }
        .toggle-btn {
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: bold; font-size: 16px;
        }
        .on { background: #ff4444; color: white; }
        .off { background: #44ff44; color: black; }

        footer { margin-top: 60px; padding: 40px 20px; text-align: center; border-top: 1px solid #222; width: 100%; max-width: 900px; }
        .kofi-button { background-color: #29abe0; color: white; padding: 18px 35px; text-decoration: none; border-radius: 20px; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Student Interaction Hub</h1>
    <p class="subtitle">One-Button Sensory Games</p>

    <!-- MASTER SENSORY TOGGLE -->
    <div class="sensory-controls">
        <span>Visual Stimulation:</span>
        <button id="sensoryToggle" class="toggle-btn off" onclick="toggleSensory()">HIGH (Standard)</button>
    </div>

    <div class="game-grid">
        <a href="dj-party/index.html" class="game-card dj"><span class="game-icon">🎧</span><span class="game-title">DJ PARTY</span></a>
        <a href="bubbles/index.html" class="game-card bubbles"><span class="game-icon">🫧</span><span class="game-title">BUBBLE POP</span></a>
        <a href="snake/index.html" class="game-card snake"><span class="game-icon">🐍</span><span class="game-title">MEGA SNAKE</span></a>
        <a href="log-hop/index.html" class="game-card loghop"><span class="game-icon">🪵</span><span class="game-title">MEGA LOG HOP</span></a>
        <a href="racer/index.html" class="game-card racer"><span class="game-icon">🏎️</span><span class="game-title">NEON RACER</span></a>
        <a href="rocket/index.html" class="game-card rocket"><span class="game-icon">🚀</span><span class="game-title">MEGA ROCKET</span></a>
    </div>

    <footer>
        <a href="https://ko-fi.com/nocoast" target="_blank" class="kofi-button">☕ Support on Ko-fi</a>
    </footer>

    <script>
        function updateButton() {
            const isLow = localStorage.getItem('lowSensory') === 'true';
            const btn = document.getElementById('sensoryToggle');
            if (isLow) {
                btn.innerText = "LOW (No Flashing)";
                btn.className = "toggle-btn on";
            } else {
                btn.innerText = "HIGH (Standard)";
                btn.className = "toggle-btn off";
            }
        }

        function toggleSensory() {
            const isLow = localStorage.getItem('lowSensory') === 'true';
            localStorage.setItem('lowSensory', !isLow);
            updateButton();
        }

        updateButton(); // Set initial state
    </script>
</body>
</html>
