<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAR TUNNEL - WARP SPEED</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FFFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        h1 { color: #00FFFF; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.2; pointer-events: none; z-index: 50; }
    </style>
</head>
<body onkeydown="handleKeyDown(event)" onkeyup="handleKeyUp(event)" onmousedown="handleMouseDown(event)" onmouseup="handleMouseUp(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">ENGINE START</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Tap to Engage Warp Drive!)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>WARP DRIVE</h1>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false;
        let switchIsDown = false;

        let speed = 2;
        let targetSpeed = 2;
        let tunnelRings = [];
        let stars = [];
        let tunnelHue = 180; 
        let shake = 0;

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            bgMusic.volume = isMuted ? 0 : 0.2;
            bgMusic.play();

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            
            for(let i=0; i<15; i++) tunnelRings.push({ z: i * 150 });
            for(let i=0; i<400; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000,
                });
            }

            requestAnimationFrame(gameLoop);
        }

        function handleKeyDown(e) { if (!e.repeat && (e.code === "Space" || e.code === "Enter")) processBoost(); }
        function handleKeyUp(e) { if (e.code === "Space" || e.code === "Enter") switchIsDown = false; }
        function handleMouseDown(e) { if (e.target.id === 'home-button') return; processBoost(); }
        function handleMouseUp() { switchIsDown = false; }

        function processBoost() {
            if (!isStarted || switchIsDown) return;
            switchIsDown = true;

            // DRAMATIC BOOST
            targetSpeed = 100; // Instant jump to high speed
            if (!lowSensoryMode) shake = 15; // Trigger camera shake
            
            playWarpSound();
            
            if (!lowSensoryMode) {
                flash.style.backgroundColor = "white";
                flash.style.opacity = 0.3;
                setTimeout(() => flash.style.opacity = 0, 150);
            }
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function playWarpSound() {
            const now = audioCtx.currentTime;
            
            // Sub-Bass Engine Thump
            const kick = audioCtx.createOscillator();
            const g1 = audioCtx.createGain();
            kick.connect(g1); g1.connect(audioCtx.destination);
            kick.frequency.setValueAtTime(100, now);
            kick.frequency.exponentialRampToValueAtTime(30, now + 0.5);
            g1.gain.setValueAtTime(0.5, now);
            g1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            kick.start(); kick.stop(now + 0.5);

            // Rising Warp Hum
            const hum = audioCtx.createOscillator();
            const g2 = audioCtx.createGain();
            hum.type = 'sawtooth';
            hum.connect(g2); g2.connect(audioCtx.destination);
            hum.frequency.setValueAtTime(40, now);
            hum.frequency.exponentialRampToValueAtTime(200, now + 0.3);
            g2.gain.setValueAtTime(0.2, now);
            g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            hum.start(); hum.stop(now + 0.4);
        }

        function gameLoop() {
            // Motion Blur background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Handle Speed Decay
            speed += (targetSpeed - speed) * 0.1;
            targetSpeed *= 0.94; // Quickly slow back down
            if (targetSpeed < 4) targetSpeed = 4;

            // Handle Shake Decay
            if (shake > 0) shake *= 0.9;

            ctx.save();
            if (shake > 0.5) {
                ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
            }

            drawStars();
            drawTunnel();
            
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function drawStars() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            stars.forEach(s => {
                s.z -= speed * 2; 
                if (s.z <= 0) s.z = 2000;

                const perspective = 600 / (600 + s.z);
                const x = cx + s.x * perspective;
                const y = cy + s.y * perspective;

                // STRETCH LOGIC:
                // Calculate position of the star in the PREVIOUS frame to create the streak
                const prevZ = s.z + speed * 3; 
                const prevP = 600 / (600 + prevZ);
                const px = cx + s.x * prevP;
                const py = cy + s.y * prevP;

                const alpha = 1 - (s.z / 2000);
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = 2 * perspective + (speed / 20); // Get thicker as we go faster
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(px, py);
                ctx.stroke();
            });
        }

        function drawTunnel() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            tunnelRings.forEach(ring => {
                ring.z -= speed;
                if (ring.z <= 0) {
                    ring.z = 1800;
                    tunnelHue = (tunnelHue + 20) % 360;
                }

                const perspective = 500 / (500 + ring.z);
                const size = 2800 * perspective;
                
                ctx.strokeStyle = `hsl(${tunnelHue}, 100%, 50%)`;
                ctx.lineWidth = 8 * perspective;
                ctx.globalAlpha = 1 - (ring.z / 1800);

                ctx.strokeRect(cx - size/2, cy - size/2, size, size);
            });
            ctx.globalAlpha = 1;
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
