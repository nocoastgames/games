<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAR TUNNEL - DEEP SPACE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FFFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FFFF;
            background: transparent; color: #00FFFF; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FFFF;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #00FFFF; font-size: 30px; font-weight: bold; z-index: 50; }
        h1 { color: #00FFFF; position: absolute; bottom: 20px; letter-spacing: 10px; opacity: 0.2; pointer-events: none; z-index: 50; }
    </style>
</head>
<body onkeydown="handleKeyDown(event)" onkeyup="handleKeyUp(event)" onmousedown="handleMouseDown(event)" onmouseup="handleMouseUp(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">ENGINE START</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Tap to Warp through the Stars!)</p>
    </div>

    <div id="hud">Distance: 0</div>
    <canvas id="gameCanvas"></canvas>
    <h1>STAR TUNNEL</h1>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const bgMusic = document.getElementById('bg-music');
        
        // --- HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let switchIsDown = false;

        let speed = 2;
        let targetSpeed = 2;
        let distance = 0;
        let tunnelRings = [];
        let stars = [];
        let tunnelHue = 180; 

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Background Music Logic
            bgMusic.volume = isMuted ? 0 : 0.2;
            bgMusic.play();

            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            
            // Create initial tunnel rings
            for(let i=0; i<15; i++) {
                tunnelRings.push({ z: i * 120 });
            }

            // Create 300 Stars for dense field
            for(let i=0; i<300; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * canvas.width * 2,
                    y: (Math.random() - 0.5) * canvas.height * 2,
                    z: Math.random() * 2000,
                    s: Math.random() * 2 + 1
                });
            }

            requestAnimationFrame(gameLoop);
        }

        function handleKeyDown(e) { if (!e.repeat && (e.code === "Space" || e.code === "Enter")) processBoost(); }
        function handleKeyUp(e) { if (e.code === "Space" || e.code === "Enter") switchIsDown = false; }
        function handleMouseDown(e) { if (e.target.id === 'home-button') return; processBoost(); }
        function handleMouseUp() { switchIsDown = false; }

        function processBoost() {
            if (!isStarted || gameState !== "play" || switchIsDown) return;
            switchIsDown = true;

            targetSpeed += 15;
            if (targetSpeed > 70) targetSpeed = 70; 
            
            playBoostSound();
            
            if (!lowSensoryMode) {
                flash.style.backgroundColor = `hsla(${tunnelHue}, 100%, 50%, 0.3)`;
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 80);
            }
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function playBoostSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40 + (speed * 8), now);
            osc.frequency.exponentialRampToValueAtTime(150 + (speed * 15), now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                speed += (targetSpeed - speed) * 0.1;
                targetSpeed *= 0.98; 
                if (targetSpeed < 3) targetSpeed = 3;

                distance += Math.floor(speed);
                hud.innerText = `Distance: ${distance}`;

                if (distance > 0 && distance % 6000 < speed) {
                    tunnelHue = (tunnelHue + 60) % 360;
                }
            }

            drawStars();
            drawTunnel();
            requestAnimationFrame(gameLoop);
        }

        function drawStars() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.fillStyle = "white";

            stars.forEach(s => {
                s.z -= speed * 1.5; // Stars move faster than rings for depth
                if (s.z <= 0) s.z = 2000;

                const perspective = 600 / (600 + s.z);
                const x = cx + s.x * perspective;
                const y = cy + s.y * perspective;
                const size = s.s * perspective * 2;

                ctx.globalAlpha = 1 - (s.z / 2000);
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawTunnel() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            tunnelRings.forEach(ring => {
                ring.z -= speed;
                if (ring.z <= 0) ring.z = 1800;

                const perspective = 500 / (500 + ring.z);
                const size = 2500 * perspective;
                
                ctx.strokeStyle = `hsl(${tunnelHue}, 100%, 50%)`;
                ctx.lineWidth = 12 * perspective;
                ctx.globalAlpha = 1 - (ring.z / 1800);

                // Draw clean square rings without diagonal corner lines
                ctx.strokeRect(cx - size/2, cy - size/2, size, size);
            });
            ctx.globalAlpha = 1;
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
