<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZONES OF LOGIC - REGULATION SKILLS</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #FFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500; text-align: center;
        }
        .settings-card {
            background: #111; padding: 30px; border-radius: 30px;
            border: 4px solid #00FF00; width: 85%; max-width: 500px;
        }
        .btn-ui {
            font-size: 30px; padding: 15px 40px; border: 6px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; cursor: pointer; margin-top: 20px;
        }

        #scenario-display { font-size: 150px; margin-bottom: 30px; transition: transform 0.5s, opacity 0.3s; z-index: 10; }
        #scenario-text { color: white; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
        
        .bin-container { display: flex; gap: 20px; z-index: 10; width: 95%; justify-content: center; }
        .bin {
            flex: 1; height: 180px; border: 6px solid #222;
            border-radius: 20px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #080808;
            transition: 0.3s; max-width: 250px;
        }
        .bin-label { font-size: 20px; font-weight: bold; margin-top: 10px; }

        /* ZONE COLORS */
        .blue-zone { border-color: #3498db; color: #3498db; }
        .green-zone { border-color: #2ecc71; color: #2ecc71; }
        .yellow-zone { border-color: #f1c40f; color: #f1c40f; }
        .red-zone { border-color: #e74c3c; color: #e74c3c; }

        .active {
            transform: scale(1.1);
            box-shadow: 0 0 50px white;
            background: #1a1a1a;
            border-color: white !important;
            color: white !important;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
    </style>
</head>
<body onkeydown="handleKeyDown(event)" onkeyup="handleKeyUp(event)" onmousedown="handleMouseDown(event)" onmouseup="handleMouseUp(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay">
        <div class="settings-card">
            <h2 style="color: #00FF00;">SOCIAL LOGIC</h2>
            <p>Scanning Speed: <span id="speed-val">2.0</span>s</p>
            <input type="range" id="speed-slider" min="1.0" max="5.0" step="0.1" value="2.0" style="width:100%;">
            
            <p>Lesson Type:</p>
            <select id="mode-select" style="font-size:20px; padding:10px; width:100%;">
                <option value="zones">Identify the Zone</option>
                <option value="size">Big vs Small Problem</option>
            </select>

            <button class="btn-ui" onclick="startEngine()">START LESSON</button>
        </div>
    </div>

    <div id="scenario-text">GET READY</div>
    <div id="scenario-display">?</div>

    <div class="bin-container" id="bin-container">
        <!-- Bins generated by JavaScript -->
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const scenarioDisplay = document.getElementById('scenario-display');
        const scenarioText = document.getElementById('scenario-text');
        const binContainer = document.getElementById('bin-container');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false, isWinner = false;
        let switchIsDown = false, inputBlocked = false;
        let scanTimer, activeIdx = 0, scanSpeed = 2000;

        const content = {
            'zones': {
                bins: [
                    { label: 'BLUE', class: 'blue-zone', voice: 'Blue Zone. Sad or Tired.' },
                    { label: 'GREEN', class: 'green-zone', voice: 'Green Zone. Calm and Ready.' },
                    { label: 'YELLOW', class: 'yellow-zone', voice: 'Yellow Zone. Frustrated or Silly.' },
                    { label: 'RED', class: 'red-zone', voice: 'Red Zone. Angry or Scared.' }
                ],
                items: [
                    { emoji: '😊', answer: 1, text: 'I feel calm' },
                    { emoji: '😡', answer: 3, text: 'I am angry' },
                    { emoji: '😢', answer: 0, text: 'I feel sad' },
                    { emoji: '😴', answer: 0, text: 'I am tired' },
                    { emoji: '😟', answer: 2, text: 'I am worried' },
                    { emoji: '🤪', answer: 2, text: 'I feel silly' },
                    { emoji: '🤬', answer: 3, text: 'Out of control' },
                    { emoji: '✅', answer: 1, text: 'Ready to learn' }
                ]
            },
            'size': {
                bins: [
                    { label: 'SMALL', class: 'green-zone', voice: 'Small Problem. I can fix it.' },
                    { label: 'BIG', class: 'red-zone', voice: 'Big Problem. I need help.' }
                ],
                items: [
                    { emoji: '✏️', answer: 0, text: 'Broken Pencil' },
                    { emoji: '🔥', answer: 1, text: 'A Fire' },
                    { emoji: '🩹', answer: 0, text: 'Small scratch' },
                    { emoji: '🚑', answer: 1, text: 'Someone is hurt' },
                    { emoji: '🍦', answer: 0, text: 'Dropped my snack' },
                    { emoji: '🌪️', answer: 1, text: 'Bad Storm' }
                ]
            }
        };

        let currentMode = 'zones';
        let currentRoundItem = null;

        document.getElementById('speed-slider').oninput = function() {
            document.getElementById('speed-val').innerText = this.value;
            scanSpeed = parseFloat(this.value) * 1000;
        };

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            currentMode = document.getElementById('mode-select').value;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            setupBins();
            nextRound();
            startScan();
            requestAnimationFrame(drawParticles);
        }

        function setupBins() {
            binContainer.innerHTML = '';
            content[currentMode].bins.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = `bin ${b.class}`;
                div.id = `bin-${i}`;
                div.innerHTML = `<div class="bin-label">${b.label}</div>`;
                binContainer.appendChild(div);
            });
        }

        function speak(text) {
            if (isMuted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function nextRound() {
            isWinner = false; inputBlocked = false;
            const items = content[currentMode].items;
            currentRoundItem = items[Math.floor(Math.random() * items.length)];
            
            scenarioDisplay.innerText = currentRoundItem.emoji;
            scenarioText.innerText = currentRoundItem.text;
            scenarioDisplay.style.transform = "scale(1)";
            scenarioDisplay.style.opacity = "1";
            speak(currentRoundItem.text);
        }

        function startScan() {
            if(scanTimer) clearInterval(scanTimer);
            scanTimer = setInterval(() => {
                if (isWinner || inputBlocked) return;
                activeIdx = (activeIdx + 1) % content[currentMode].bins.length;
                updateVisualSelection();
                playSynth('tick', 0.1);
                speak(content[currentMode].bins[activeIdx].voice);
            }, scanSpeed);
        }

        function updateVisualSelection() {
            content[currentMode].bins.forEach((_, i) => {
                document.getElementById(`bin-${i}`).classList.toggle('active', i === activeIdx);
            });
        }

        function handleKeyDown(e) { if (!e.repeat && (e.code === "Space" || e.code === "Enter")) processInput(); }
        function handleKeyUp(e) { if (e.code === "Space" || e.code === "Enter") switchIsDown = false; }
        function handleMouseDown(e) { if (e.target.id === 'home-button' || e.target.type === 'range' || e.target.tagName === 'SELECT') return; processInput(); }
        function handleMouseUp() { switchIsDown = false; }

        function processInput() {
            if (!isStarted || isWinner || inputBlocked || switchIsDown) return;
            switchIsDown = true;
            if (activeIdx === currentRoundItem.answer) success();
            else fail();
        }

        function success() {
            isWinner = true;
            playSynth('win', 0.5);
            speak("Great job identifying that!");
            
            const targetBin = document.getElementById(`bin-${activeIdx}`).getBoundingClientRect();
            scenarioDisplay.style.transform = `translate(${targetBin.left - window.innerWidth/2 + 100}px, 300px) scale(0.1)`;
            scenarioDisplay.style.opacity = "0";

            if (!lowSensoryMode) triggerMegaParty();
            setTimeout(nextRound, 4000);
        }

        function fail() {
            inputBlocked = true;
            playSynth('fail', 0.3);
            const el = document.getElementById(`bin-${activeIdx}`);
            el.style.borderColor = "#FF0000";
            scenarioDisplay.style.transform = "translateX(30px)"; 
            setTimeout(() => {
                el.style.borderColor = "";
                scenarioDisplay.style.transform = "translateX(0px)";
                inputBlocked = false;
            }, 1000);
        }

        function playSynth(type, vol) {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'tick') {
                osc.frequency.setValueAtTime(200, now); gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05); osc.start(); osc.stop(now + 0.05);
            } else if (type === 'win') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.5); gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5); osc.start(); osc.stop(now + 0.5);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        let particles = [];
        function triggerMegaParty() {
            flash.style.backgroundColor = "white"; flash.style.opacity = 0.2;
            setTimeout(() => flash.style.opacity = 0, 100);
            for(let i=0; i<20; i++) particles.push({x: canvas.width/2, y: canvas.height/2, vx: (Math.random()-0.5)*25, vy: (Math.random()-0.5)*25, life: 1, color: '#00FF00', s: 12});
        }
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            requestAnimationFrame(drawParticles);
        }
    </script>
</body>
</html>
