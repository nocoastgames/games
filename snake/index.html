<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA SNAKE - NEON PREDATOR</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; pointer-events: none;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FF00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer;
        }
        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        #hud { position: absolute; top: 20px; right: 20px; color: #00FF00; font-size: 32px; font-weight: bold; z-index: 50; text-shadow: 0 0 10px #00FF00; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START SNAKE</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Get 10 Apples to Win!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #00FF00; font-size: 100px; margin: 0;">AMAZING!</h2>
        <p style="color: white; font-size: 40px;">YOU ARE A SNAKE MASTER!</p>
    </div>

    <div id="hud">0/10</div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        const bgMusic = document.getElementById('bg-music');
        
        // --- HUB SETTINGS ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 150;

        let snake = [], snakeSize = 15, appleCount = 0;
        let apple = {x: 400, y: 400}, moveBuffer = 0, headSize = 40;
        
        let particles = [], ripples = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgMusic.volume = isMuted ? 0 : 0.2;
            bgMusic.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            resetSnake();
            requestAnimationFrame(gameLoop);
        }

        function resetSnake() {
            snake = [];
            for(let i=0; i<snakeSize; i++) {
                snake.push({x: canvas.width/2, y: canvas.height/2});
            }
            appleCount = 0;
            moveBuffer = 0;
            gameState = "play";
            winOverlay.style.display = 'none';
            hud.innerText = `${appleCount}/10`;
            spawnApple();
        }

        function spawnApple() {
            apple.x = 200 + Math.random() * (canvas.width - 400);
            apple.y = 200 + Math.random() * (canvas.height - 400);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState === "win") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            moveBuffer += 350; // Big lunge
            headSize = 70; // Big head zoom
            playSynth('kick', 0.8);

            if (!lowSensoryMode) {
                flash.style.backgroundColor = "rgba(0, 255, 0, 0.2)";
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 80);
            }
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function winSequence() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynth('win', 1.0);
            
            let winTimer = setInterval(() => {
                if(!lowSensoryMode) megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 300);

            setTimeout(() => {
                clearInterval(winTimer);
                resetSnake();
            }, 6000);
        }

        function megaCelebration(x, y) {
            flash.style.backgroundColor = "white"; flash.style.opacity = 0.3;
            setTimeout(() => flash.style.opacity = 0, 100);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: Math.random()*Math.PI*2, life: 1});
            for(let i=0; i<15; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`, s: 12
            });
        }

        function playSynth(type, vol) {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'kick') {
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'bite') {
                osc.frequency.setValueAtTime(300 + (appleCount * 50), now);
                osc.frequency.exponentialRampToValueAtTime(800 + (appleCount * 50), now + 0.1);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 1);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(); osc.stop(now + 1);
            }
        }

        function gameLoop() {
            // Trail effect (semi-transparent clear)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                const dx = apple.x - snake[0].x;
                const dy = apple.y - snake[0].y;
                const targetAngle = Math.atan2(dy, dx);

                if (moveBuffer > 0) {
                    let step = 28; // Fast smooth lunge
                    let nextX = snake[0].x + Math.cos(targetAngle) * step;
                    let nextY = snake[0].y + Math.sin(targetAngle) * step;
                    
                    snake.unshift({ x: nextX, y: nextY });
                    if (snake.length > snakeSize) snake.pop();
                    moveBuffer -= step;

                    // Draw ghost trail during boost
                    ctx.strokeStyle = "rgba(0, 255, 0, 0.3)";
                    ctx.lineWidth = 40;
                    ctx.beginPath();
                    ctx.moveTo(snake[0].x, snake[0].y);
                    ctx.lineTo(snake[snake.length-1].x, snake[snake.length-1].y);
                    ctx.stroke();
                }

                if (Math.hypot(snake[0].x - ap
