<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA SNAKE - NEXT GEN</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        /* UNOBTRUSIVE HOME */
        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 12px; opacity: 0.3; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.2); }

        /* PRO START BUTTON */
        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 600; pointer-events: none;}

        .btn-start {
            font-size: 40px; padding: 25px 50px; border: 4px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,0,0.3);
            transition: 0.2s;
        }
        .btn-start:hover { background: #00FF00; color: #000; }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #00FF00; font-size: 24px; font-weight: bold; opacity: 0.6; z-index: 50; text-align: right;}
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay">
        <button class="btn-start" onclick="startEngine(event)">START SNAKE</button>
        <p style="color: #666; margin-top: 20px; letter-spacing: 1px;">PHASE 2: DIRECTED MOTION</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #00FF00; font-size: 80px; margin: 0;">AMAZING!</h2>
        <p style="color: white; font-size: 32px;">YOU ARE A MASTER CHEF!</p>
    </div>

    <div id="hud">
        APPLES: <span id="apple-count">0</span>/10<br>
        BOOSTS: <span id="hit-count">0</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        const appleDisplay = document.getElementById('apple-count');
        const hitDisplay = document.getElementById('hit-count');
        const winOverlay = document.getElementById('win-overlay');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        const isMuted = localStorage.getItem('muteMusic') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 150;
        let sessionHits = 0, appleCount = 0;

        // Snake Physics
        let snake = [];
        let snakeSize = 20;
        let apple = {x: 400, y: 400};
        let moveBuffer = 0;
        let headSize = 45;
        let particles = [], lasers = [];

        function startEngine(e) {
            if(e) e.stopPropagation();
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) {
                    bgMusic.volume = 0.2;
                    bgMusic.play().catch(err => console.log("Audio block"));
                }
            } catch (err) {}

            resize();
            resetGame();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            snake = [];
            for(let i=0; i<snakeSize; i++) {
                snake.push({x: canvas.width/2, y: canvas.height/2});
            }
            appleCount = 0;
            sessionHits = 0;
            moveBuffer = 0;
            gameState = "play";
            winOverlay.style.display = 'none';
            appleDisplay.innerText = "0";
            hitDisplay.innerText = "0";
            spawnApple();
        }

        function spawnApple() {
            apple.x = 200 + Math.random() * (canvas.width - 400);
            apple.y = 200 + Math.random() * (canvas.height - 400);
        }

        function handleInput(event) {
            if (!isStarted || gameState === "win") return;
            if (event.target.id === 'home-button' || event.target.className === 'btn-start') return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- DATA COLLECTION ---
            sessionHits++;
            hitDisplay.innerText = sessionHits;
            
            // Movement Action
            moveBuffer += 350; 
            headSize = 80; 
            playSynth('kick', 0.8);

            if (!lowSensoryMode) {
                flash.style.backgroundColor = "rgba(0, 255, 0, 0.2)";
                flash.style.opacity = 1;
                setTimeout(() => flash.style.opacity = 0, 80);
            }
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function winSequence() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynth('win', 1.0);
            
            let winTimer = setInterval(() => {
                if(!lowSensoryMode) megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                resetGame();
            }, 6000);
        }

        function megaCelebration(x, y) {
            flash.style.backgroundColor = "white"; flash.style.opacity = 0.3;
            setTimeout(() => flash.style.opacity = 0, 100);
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: Math.random()*Math.PI*2, life: 1});
            for(let i=0; i<15; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`, s: 12
            });
        }

        function playSynth(type, vol) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'kick') {
                osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'bite') {
                osc.frequency.setValueAtTime(300 + (appleCount * 60), now); osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
                gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(); osc.stop(now + 0.15);
            } else if (type === 'win') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 1.2);
                gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                osc.start(); osc.stop(now + 1.2);
            }
        }

        function gameLoop() {
            // Motion blur trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                const dx = apple.x - snake[0].x;
                const dy = apple.y - snake[0].y;
                const targetAngle = Math.atan2(dy, dx);

                if (moveBuffer > 0) {
                    let step = 30; 
                    let nextX = snake[0].x + Math.cos(targetAngle) * step;
                    let nextY = snake[0].y + Math.sin(targetAngle) * step;
                    snake.unshift({ x: nextX, y: nextY });
                    if (snake.length > snakeSize) snake.pop();
                    moveBuffer -= step;

                    // Predator Lunge Glow
                    ctx.shadowBlur = 30; ctx.shadowColor = "#00FF00";
                }

                if (Math.hypot(snake[0].x - apple.x, snake[0].y - apple.y) < 60) {
                    appleCount++;
                    appleDisplay.innerText = appleCount;
                    
                    // --- DATA LOG: LOG SUCCESS TO HUB ---
                    let totalS = parseInt(localStorage.getItem('statSuccess') || 0);
                    localStorage.setItem('statSuccess', totalS + 1);

                    if (appleCount >= 10) winSequence();
                    else {
                        playSynth('bite', 0.6);
                        snakeSize += 10;
                        spawnApple();
                        megaCelebration(apple.x, apple.y);
                    }
                }
            }

            if (headSize > 45) headSize -= 2;

            // DRAW APPLE
            if (gameState === "play") {
                let br = 1 + Math.sin(Date.now() * 0.008) * 0.2;
                ctx.fillStyle = '#FF0000'; ctx.shadowBlur = 40 * br; ctx.shadowColor = "red";
                ctx.beginPath(); ctx.arc(apple.x, apple.y, 40 * br, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // DRAW FLUID SNAKE
            snake.forEach((seg, i) => {
                const hue = (120 + i * 5) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                let r = (i === 0) ? headSize : Math.max(35 - (i * 0.8), 8);
                ctx.beginPath(); ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2); ctx.fill();

                if(i === 0) { // Kawaii Head
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(seg.x-14, seg.y-14, 12, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(seg.x+14, seg.y-14, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "black";
                    ctx.beginPath(); ctx.arc(seg.x-14, seg.y-16, 6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(seg.x+14, seg.y-16, 6, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            // DRAW PARTICLES
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            });
            particles = particles.filter(p => p.life > 0);
            
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(0, 255, 255, ${l.life})`; ctx.lineWidth = 15*l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x+Math.cos(l.angle)*2500, l.y+Math.sin(l.angle)*2500); ctx.stroke();
                l.life -= 0.04;
            });
            lasers = lasers.filter(l => l.life > 0);

            ctx.globalAlpha = 1;
            requestAnimationFrame(gameLoop);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
    </script>
</body>
</html>
