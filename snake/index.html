<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE - MEGA LUNGE PARTY</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FF00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #start-btn {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; z-index: 10; }

        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            opacity: 0; z-index: 100; pointer-events: none;
        }

        h1 { color: #00FF00; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>

    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div id="start-btn">START SNAKE</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Click for MEGA LUNGE)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>MEGA SNAKE</h1>

    <audio id="bg-beat" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgBeat = document.getElementById('bg-beat');
        const flash = document.getElementById('flash');
        
        let audioCtx;
        let isStarted = false;
        let lastPressTime = 0;
        const cooldown = 150;

        // Snake & Game State
        let snake = [{x: 200, y: 200}];
        let snakeSize = 10;
        let apple = {x: 400, y: 400};
        let moveBuffer = 0; 
        let headSize = 35;
        
        // Effects lists
        let particles = [];
        let ripples = [];
        let lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgBeat.volume = 0.2;
            bgBeat.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            spawnApple();
            requestAnimationFrame(gameLoop);
        }

        function spawnApple() {
            apple.x = 200 + Math.random() * (canvas.width - 400);
            apple.y = 200 + Math.random() * (canvas.height - 400);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- SUPER LUNGE DISTANCE ---
            moveBuffer += 300; 
            headSize = 60; 
            
            playSynth('kick', 0.9);
            
            // Screen Flash on every click
            flash.style.backgroundColor = "rgba(0, 255, 0, 0.3)";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 80);
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function megaCelebration(x, y) {
            // 1. Full Screen Flash
            flash.style.backgroundColor = "white";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 400);

            // 2. Add Ripple (Expanding Circle)
            ripples.push({x: x, y: y, r: 10, opacity: 1});

            // 3. Add Lasers
            for(let i=0; i<8; i++) {
                lasers.push({x: x, y: y, angle: (i * 45) * Math.PI/180, life: 1});
            }

            // 4. Add Particles
            for(let i=0; i<20; i++) {
                particles.push({
                    x: x, y: y, 
                    vx: (Math.random()-0.5) * 20, 
                    vy: (Math.random()-0.5) * 20, 
                    life: 1,
                    color: `hsl(${Math.random()*360}, 100%, 50%)`
                });
            }
        }

        function playSynth(type, vol) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'kick') {
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.6);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(); osc.stop(now + 0.6);
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Steering
            const dx = apple.x - snake[0].x;
            const dy = apple.y - snake[0].y;
            const targetAngle = Math.atan2(dy, dx);

            // Lunge Movement
            if (moveBuffer > 0) {
                let step = 25; // Speed of movement
                snake.unshift({
                    x: snake[0].x + Math.cos(targetAngle) * step,
                    y: snake[0].y + Math.sin(targetAngle) * step
                });
                if (snake.length > snakeSize) snake.pop();
                moveBuffer -= step;
            }

            if (headSize > 35) headSize -= 2;

            // Collision
            if (Math.hypot(snake[0].x - apple.x, snake[0].y - apple.y) < 50) {
                megaCelebration(apple.x, apple.y);
                playSynth('win', 0.8);
                snakeSize += 5;
                spawnApple();
            }

            // --- DRAW EFFECTS ---
            // Lasers
            lasers.forEach((l, i) => {
                ctx.strokeStyle = `rgba(0, 255, 255, ${l.life})`;
                ctx.lineWidth = 10 * l.life;
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000);
                ctx.stroke();
                l.life -= 0.05;
            });
            lasers = lasers.filter(l => l.life > 0);

            // Ripples
            ripples.forEach((r, i) => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`;
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
                ctx.stroke();
                r.r += 20;
                r.opacity -= 0.03;
            });
            ripples = ripples.filter(r => r.opacity > 0);

            // Particles
            particles.forEach((p, i) => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
                ctx.fill();
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;

            // Draw Apple
            ctx.fillStyle = '#FF0000';
            ctx.shadowBlur = 40; ctx.shadowColor = "red";
            ctx.beginPath(); ctx.arc(apple.x, apple.y, 35, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((seg, i) => {
                ctx.fillStyle = `hsl(${120 + i * 5}, 100%, 50%)`;
                let r = (i === 0) ? headSize : 25 - (i * 0.5);
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, Math.max(r, 5), 0, Math.PI * 2);
                ctx.fill();
                if(i === 0) { // Eyes
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(seg.x-10, seg.y-10, 6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(seg.x+10, seg.y-10, 6, 0, Math.PI*2); ctx.fill();
                }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
