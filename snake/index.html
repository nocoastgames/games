<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHNO SNAKE - MEGA LUNGE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FF00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #start-btn {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; z-index: 10; }

        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            opacity: 0; z-index: 5; pointer-events: none;
        }

        h1 { color: #00FF00; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>

    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div id="start-btn">START SNAKE</div>
        <p style="margin-top: 20px; color: white;">(Click to Lunge Forward)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>TECHNO SNAKE</h1>

    <audio id="bg-beat" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgBeat = document.getElementById('bg-beat');
        const flash = document.getElementById('flash');
        
        let audioCtx;
        let isStarted = false;
        let lastPressTime = 0;
        const cooldown = 100;

        // Snake Logic
        let snake = [{x: 100, y: 100}];
        let snakeSize = 8;
        let apple = {x: 300, y: 300};
        let moveBuffer = 0; // Stored distance to move
        let headSize = 30; // Current size for the zoom effect

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgBeat.volume = 0.2;
            bgBeat.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            spawnApple();
            requestAnimationFrame(gameLoop);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            // --- INCREASED DISTANCE ---
            moveBuffer += 120; // One click moves the snake significantly
            headSize = 50;    // Visual "Zoom" on click
            
            playSynth('kick', 0.8);
            triggerVisuals();
        }

        function triggerVisuals() {
            flash.style.backgroundColor = "rgba(0, 255, 255, 0.3)";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 100);
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function playSynth(type, vol) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'kick') {
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(); osc.stop(now + 0.4);
            }
        }

        function spawnApple() {
            apple.x = 150 + Math.random() * (canvas.width - 300);
            apple.y = 150 + Math.random() * (canvas.height - 300);
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Auto-Steering
            const dx = apple.x - snake[0].x;
            const dy = apple.y - snake[0].y;
            const targetAngle = Math.atan2(dy, dx);

            // Movement logic
            if (moveBuffer > 0) {
                let step = 12; // Speed of the lunge
                let vx = Math.cos(targetAngle) * step;
                let vy = Math.sin(targetAngle) * step;

                let newHead = { x: snake[0].x + vx, y: snake[0].y + vy };
                snake.unshift(newHead);
                
                if (snake.length > snakeSize) {
                    snake.pop();
                }
                moveBuffer -= step;
            }

            // Return head size to normal over time (Zoom out effect)
            if (headSize > 30) headSize -= 1;

            // Collision with Apple
            const dist = Math.hypot(snake[0].x - apple.x, snake[0].y - apple.y);
            if (dist < 40) {
                snakeSize += 4;
                spawnApple();
                playSynth('win', 0.7);
                megaCelebration();
            }

            // Draw Apple (Glow effect)
            ctx.fillStyle = '#FF0000';
            ctx.shadowBlur = 30;
            ctx.shadowColor = "red";
            ctx.beginPath();
            ctx.arc(apple.x, apple.y, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((seg, i) => {
                ctx.fillStyle = `hsl(${120 + i * 5}, 100%, 50%)`;
                if (i === 0) {
                    // Draw the head with the current "Zoom" size
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, headSize, 0, Math.PI * 2);
                    ctx.fill();
                    // Draw eyes
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(seg.x-10, seg.y-5, 5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(seg.x+10, seg.y-5, 5, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, 20 - (i * 0.8 > 15 ? 15 : i * 0.8), 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function megaCelebration() {
            flash.style.backgroundColor = "white";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 400);
        }
    </script>
</body>
</html>
