<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE - ACCESSIBILITY MODE</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay, #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #win-overlay { background: rgba(0,0,0,0.9); display: none; z-index: 200; }

        .btn-ui {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
        
        #hud { position: absolute; top: 20px; right: 20px; color: #00FF00; font-size: 30px; font-weight: bold; z-index: 50; }
        h1 { color: #00FF00; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div class="btn-ui">START SNAKE</div>
        <p style="margin-top: 20px; color: white; font-size: 24px;">(Get 10 Apples to Win!)</p>
    </div>

    <div id="win-overlay">
        <h2 style="color: #00FF00; font-size: 80px; margin: 0;">GREAT JOB!</h2>
        <p style="color: white; font-size: 30px;">YOU GOT 10 APPLES!</p>
    </div>

    <div id="hud">Apples: 0/10</div>
    <canvas id="gameCanvas"></canvas>
    <h1>MEGA SNAKE</h1>

    <audio id="bg-beat" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgBeat = document.getElementById('bg-beat');
        const flash = document.getElementById('flash');
        const hud = document.getElementById('hud');
        const winOverlay = document.getElementById('win-overlay');
        
        // --- SENSORY MODE CHECK ---
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';

        let audioCtx, isStarted = false, gameState = "play";
        let lastPressTime = 0, cooldown = 150;

        let snake = [], snakeSize = 10, appleCount = 0;
        let apple = {x: 400, y: 400}, moveBuffer = 0, headSize = 35;
        
        let particles = [], ripples = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgBeat.volume = 0.2;
            bgBeat.play();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            resetSnake();
            requestAnimationFrame(gameLoop);
        }

        function resetSnake() {
            snake = [{x: canvas.width/2, y: canvas.height/2}];
            snakeSize = 10;
            appleCount = 0;
            moveBuffer = 0;
            gameState = "play";
            winOverlay.style.display = 'none';
            hud.innerText = `Apples: ${appleCount}/10`;
            spawnApple();
        }

        function spawnApple() {
            apple.x = 200 + Math.random() * (canvas.width - 400);
            apple.y = 200 + Math.random() * (canvas.height - 400);
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState === "win") return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            moveBuffer += 300; 
            headSize = 60; 
            playSynth('kick', 0.9);

            // Only flash screen if NOT in low sensory mode
            if (!lowSensoryMode) {
                flashScreen("rgba(0, 255, 0, 0.3)", 80);
            }
            if (navigator.vibrate) navigator.vibrate(60);
        }

        function flashScreen(color, time) {
            if (lowSensoryMode) return;
            flash.style.backgroundColor = color;
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, time);
        }

        function winSequence() {
            gameState = "win";
            winOverlay.style.display = 'flex';
            playSynth('win', 1.0);
            
            let winTimer = setInterval(() => {
                megaCelebration(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 400);

            setTimeout(() => {
                clearInterval(winTimer);
                resetSnake();
            }, 5000);
        }

        function megaCelebration(x, y) {
            if (lowSensoryMode) return; // Skip all flashes/lasers/ripples

            flashScreen("white", 200);
            ripples.push({x: x, y: y, r: 10, opacity: 1});
            for(let i=0; i<8; i++) lasers.push({x: x, y: y, angle: (i * 45) * Math.PI/180, life: 1});
            for(let i=0; i<20; i++) particles.push({
                x: x, y: y, vx: (Math.random()-0.5) * 20, vy: (Math.random()-0.5) * 20, 
                life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`
            });
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if(type === 'kick') {
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.8);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(); osc.stop(now + 0.8);
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "play") {
                const dx = apple.x - snake[0].x;
                const dy = apple.y - snake[0].y;
                const targetAngle = Math.atan2(dy, dx);

                if (moveBuffer > 0) {
                    let step = 25; 
                    snake.unshift({ x: snake[0].x + Math.cos(targetAngle) * step, y: snake[0].y + Math.sin(targetAngle) * step });
                    if (snake.length > snakeSize) snake.pop();
                    moveBuffer -= step;
                }

                if (Math.hypot(snake[0].x - apple.x, snake[0].y - apple.y) < 50) {
                    appleCount++;
                    hud.innerText = `Apples: ${appleCount}/10`;
                    
                    if (appleCount >= 10) {
                        winSequence();
                    } else {
                        megaCelebration(apple.x, apple.y);
                        playSynth('win', 0.6);
                        snakeSize += 5;
                        spawnApple();
                    }
                }
            }

            if (headSize > 35) headSize -= 2;

            // DRAW EFFECTS (Only process if lists aren't empty)
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(0, 255, 255, ${l.life})`; ctx.lineWidth = 15 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000); ctx.stroke();
                l.life -= 0.03;
            });
            ripples.forEach(r => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`; ctx.lineWidth = 10;
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
                r.r += 20; r.opacity -= 0.03;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            lasers = lasers.filter(l => l.life > 0);
            ripples = ripples.filter(r => r.opacity > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;

            // DRAW APPLE
            if (gameState === "play") {
                ctx.fillStyle = '#FF0000'; ctx.shadowBlur = 40; ctx.shadowColor = "red";
                ctx.beginPath(); ctx.arc(apple.x, apple.y, 35, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // DRAW SNAKE
            snake.forEach((seg, i) => {
                ctx.fillStyle = `hsl(${120 + i * 5}, 100%, 50%)`;
                let r = (i === 0) ? headSize : 25 - (i * 0.5);
                ctx.beginPath(); ctx.arc(seg.x, seg.y, Math.max(r, 5), 0, Math.PI * 2); ctx.fill();
                if(i === 0) { 
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(seg.x-10, seg.y-10, 6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(seg.x+10, seg.y-10, 6, 0, Math.PI*2); ctx.fill();
                }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
