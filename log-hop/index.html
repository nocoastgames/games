<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA LOG HOP - PARTY EDITION</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #FFF; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; text-align: center;
        }
        .settings-box {
            background: #1a1a1a; padding: 25px; border-radius: 30px;
            border: 4px solid #FF8C00; width: 90%; max-width: 550px;
        }
        .row { margin-bottom: 15px; }
        .color-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .color-opt {
            width: 45px; height: 45px; border-radius: 50%; border: 4px solid transparent;
            cursor: pointer; transition: 0.2s;
        }
        .color-opt.active { border-color: white; transform: scale(1.1); }
        .color-opt.distractor.active { border-color: #FF4500; border-style: dashed; }

        .toggle-group { display: flex; justify-content: center; gap: 10px; }
        .toggle-btn {
            padding: 10px 20px; border-radius: 15px; border: 2px solid #555;
            background: #222; color: #aaa; cursor: pointer; font-weight: bold;
        }
        .toggle-btn.active { background: #FF8C00; color: white; border-color: white; }
        
        .btn-start {
            font-size: 35px; padding: 15px 40px; border: 6px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; cursor: pointer; margin-top: 10px;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 150; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay">
        <div class="settings-box">
            <h2 style="color: #FF8C00; margin-top:0;">FROG SETTINGS</h2>
            <div class="row">
                <p>Mode:</p>
                <div class="toggle-group">
                    <button id="mode-free" class="toggle-btn active" onclick="setMode('free')">FREE PLAY</button>
                    <button id="mode-match" class="toggle-btn" onclick="setMode('match')">COLOR MATCH</button>
                </div>
            </div>
            <div class="row"><p>Frog Color:</p><div id="target-colors" class="color-grid"></div></div>
            <div id="distractor-row" class="row" style="display:none;"><p>Distractor Colors:</p><div id="distractor-colors" class="color-grid"></div></div>
            <button class="btn-start" onclick="startEngine()">START GAME</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- NEW UNIQUE BACKGROUND MUSIC (Whimsical & Fun) -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        
        const lowSensoryMode = localStorage.getItem('lowSensory') === 'true';
        let audioCtx, isStarted = false;
        let lastPressTime = 0, cooldown = 400;

        const colorPalette = [
            { hue: 120, name: 'Green' }, { hue: 180, name: 'Cyan' },
            { hue: 300, name: 'Pink' }, { hue: 30,  name: 'Orange' },
            { hue: 0,   name: 'Red' }, { hue: 240, name: 'Blue' }
        ];

        let gameMode = 'free', targetHue = 120, distractorHues = [300, 180];

        function setMode(m) {
            gameMode = m;
            document.getElementById('mode-free').className = (m === 'free' ? 'toggle-btn active' : 'toggle-btn');
            document.getElementById('mode-match').className = (m === 'match' ? 'toggle-btn active' : 'toggle-btn');
            document.getElementById('distractor-row').style.display = (m === 'match' ? 'block' : 'none');
        }

        const targetGrid = document.getElementById('target-colors');
        const distractorGrid = document.getElementById('distractor-colors');

        colorPalette.forEach(c => {
            let tDiv = document.createElement('div');
            tDiv.className = 'color-opt' + (c.hue === 120 ? ' active' : '');
            tDiv.style.backgroundColor = `hsl(${c.hue}, 100%, 50%)`;
            tDiv.onclick = () => { targetHue = c.hue; document.querySelectorAll('#target-colors .color-opt').forEach(el => el.classList.remove('active')); tDiv.classList.add('active'); };
            targetGrid.appendChild(tDiv);

            let dDiv = document.createElement('div');
            dDiv.className = 'color-opt distractor' + (distractorHues.includes(c.hue) ? ' active' : '');
            dDiv.style.backgroundColor = `hsl(${c.hue}, 100%, 50%)`;
            dDiv.onclick = () => {
                if (distractorHues.includes(c.hue)) { distractorHues = distractorHues.filter(h => h !== c.hue); dDiv.classList.remove('active'); }
                else { distractorHues.push(c.hue); dDiv.classList.add('active'); }
            };
            distractorGrid.appendChild(dDiv);
        });

        let riverLanes = 3, steps = [], laneData = [], gameState = "play";
        let bankWidth = 180, sandbarWidth = 80, laneWidth;
        let frog = { stepIdx: 0, x: 0, y: 0, targetX: 0, isJumping: false, jumpT: 0, isBouncing: false };
        let sparkles = [], particles = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgMusic.volume = 0.2; bgMusic.play();
            resize(); resetGame();
            for(let i=0; i<80; i++) sparkles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3+1, alpha: Math.random(), v: Math.random()*0.02+0.01 });
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            frog.y = canvas.height / 2;
            steps = [{ type: 'bank', x: bankWidth/2 }]; 
            let remainingWidth = canvas.width - (bankWidth * 2);
            laneWidth = (remainingWidth - (sandbarWidth * (riverLanes-1))) / riverLanes;
            let currentX = bankWidth;
            for(let i=0; i<riverLanes; i++) {
                steps.push({ type: 'lane', x: currentX + laneWidth/2, laneIdx: i });
                currentX += laneWidth;
                if (i < riverLanes - 1) { steps.push({ type: 'sandbar', x: currentX + sandbarWidth/2 }); currentX += sandbarWidth; }
            }
            steps.push({ type: 'bank', x: canvas.width - bankWidth/2 }); 
        }

        function isOnWater(x) {
            if (x < bankWidth || x > canvas.width - bankWidth) return false;
            for (let step of steps) { if (step.type === 'sandbar' && x > step.x - sandbarWidth/2 && x < step.x + sandbarWidth/2) return false; }
            return true;
        }

        function resetGame() {
            gameState = "play"; frog.stepIdx = 0; frog.x = steps[0].x; frog.y = canvas.height/2;
            frog.isJumping = false; frog.isBouncing = false;
            laneData = [];
            let logPool = (gameMode === 'match') ? [targetHue, ...distractorHues] : [targetHue, 30, 200, 300];
            for(let i=0; i<riverLanes; i++) {
                let dir = (i % 2 === 0) ? 1 : -1;
                let speed = 0.7 + Math.random() * 0.4;
                let logs = []; let currY = -200;
                while (currY < canvas.height + 400) {
                    logs.push({ y: currY, h: canvas.height * 0.55, hue: logPool[Math.floor(Math.random()*logPool.length)] });
                    currY += (canvas.height * 0.55) + 120;
                }
                laneData.push({ laneIdx: i, speed, dir, logs });
            }
        }

        function handleInput(event) {
            if (event.target.id === 'home-button' || !isStarted || gameState !== "play" || frog.isJumping) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;
            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;
            jumpForward();
        }

        function jumpForward() {
            frog.isJumping = true; frog.isBouncing = false; frog.jumpT = 0;
            frog.oldX = frog.x; frog.stepIdx++; frog.targetX = steps[frog.stepIdx].x;
            playSynth('jump', 0.2);
        }

        function bounceBack() {
            frog.isJumping = true; frog.isBouncing = true; frog.jumpT = 0;
            frog.oldX = frog.x; frog.stepIdx--; frog.targetX = steps[frog.stepIdx].x;
            playSynth('bounce', 0.3);
        }

        function winSequence() {
            gameState = "win";
            playSynth('win', 0.6);
            let winTimer = setInterval(() => { if(!lowSensoryMode) spawnFirework(Math.random()*canvas.width, Math.random()*canvas.height); }, 400);
            setTimeout(() => { clearInterval(winTimer); resetGame(); }, 6000);
        }

        function spawnFirework(x, y) {
            flashScreen("white", 100);
            let hue = colorPalette[Math.floor(Math.random()*colorPalette.length)].hue;
            for(let i=0; i<25; i++) {
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*25, vy: (Math.random()-0.5)*25, life: 1, color: `hsl(${hue}, 100%, 50%)`, s: 12 });
            }
        }

        function flashScreen(color, time) {
            if (lowSensoryMode) return;
            flash.style.backgroundColor = color; flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, time);
        }

        function playSynth(type, vol) {
            const now = audioCtx.currentTime;
            if(type === 'jump' || type === 'bounce') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(type==='jump'?300:400, now);
                osc.frequency.exponentialRampToValueAtTime(type==='jump'?600:100, now+0.1);
                gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.2);
                osc.start(); osc.stop(now+0.2);
            } else if (type === 'win') {
                const notes = [261, 329, 392, 523];
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i*0.15); g.gain.setValueAtTime(vol, now + i*0.15);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.5);
                    o.start(now + i*0.15); o.stop(now + i*0.15 + 0.5);
                });
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#050525'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            sparkles.forEach(s => {
                s.alpha += s.v; if (s.alpha > 1 || s.alpha < 0) s.v *= -1;
                if (isOnWater(s.x)) { ctx.globalAlpha = s.alpha; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }
            });
            ctx.globalAlpha = 1;

            steps.forEach(step => {
                if (step.type === 'bank') { ctx.fillStyle = '#222'; ctx.fillRect(step.x - bankWidth/2, 0, bankWidth, canvas.height); }
                else if (step.type === 'sandbar') {
                    ctx.fillStyle = 'rgba(255, 140, 0, 0.15)'; ctx.fillRect(step.x - sandbarWidth/2, 0, sandbarWidth, canvas.height);
                    ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 2; ctx.strokeRect(step.x - sandbarWidth/2, 0, sandbarWidth, canvas.height);
                }
            });

            laneData.forEach(lane => {
                let laneX = steps.find(s => s.laneIdx === lane.laneIdx).x;
                lane.logs.forEach(log => {
                    log.y += lane.speed * lane.dir;
                    if (lane.dir === 1 && log.y > canvas.height + 100) log.y -= (lane.logs.length * (log.h + 120));
                    else if (lane.dir === -1 && log.y < -log.h - 100) log.y += (lane.logs.length * (log.h + 120));
                    ctx.fillStyle = `hsl(${log.hue}, 100%, 50%)`;
                    ctx.beginPath(); ctx.roundRect(laneX - (laneWidth*0.4), log.y, laneWidth*0.8, log.h, 25); ctx.fill();
                });
            });

            if (!frog.isJumping && gameState === "play") {
                let currentStep = steps[frog.stepIdx];
                if (currentStep.type === 'lane') {
                    let lane = laneData.find(l => l.laneIdx === currentStep.laneIdx);
                    frog.y += lane.speed * lane.dir;
                    if (frog.y < -50 || frog.y > canvas.height + 50) resetGame();
                }
            }

            if (frog.isJumping) {
                frog.jumpT += 0.05; let arc = Math.sin(frog.jumpT * Math.PI) * 150;
                frog.x = frog.oldX + (frog.targetX - frog.oldX) * frog.jumpT;
                drawFrog(frog.x, frog.y - arc);
                if (frog.jumpT >= 1) { frog.x = frog.targetX; frog.isJumping = false; if (!frog.isBouncing) checkLanding(); }
            } else { drawFrog(frog.x, frog.y); }

            if (gameState === "win") {
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,255,0,0.5)";
                ctx.font = "bold 80px sans-serif"; ctx.fillText("GREAT JOB!", canvas.width/2, canvas.height/2);
                ctx.font = "bold 30px sans-serif"; ctx.fillText("YOU CROSSED THE RIVER!", canvas.width/2, canvas.height/2 + 60);
                ctx.shadowBlur = 0;
            }

            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
            requestAnimationFrame(gameLoop);
        }

        function checkLanding() {
            let currentStep = steps[frog.stepIdx];
            if (currentStep.type === 'bank' && frog.stepIdx > 0) { winSequence(); return; }
            if (currentStep.type === 'lane') {
                let lane = laneData.find(l => l.laneIdx === currentStep.laneIdx);
                let hitLog = lane.logs.find(log => frog.y >= log.y && frog.y <= log.y + log.h);
                if (!hitLog) resetGame();
                else if (gameMode === 'match' && hitLog.hue !== targetHue) bounceBack();
                else if (navigator.vibrate) navigator.vibrate(60);
            }
        }

        function drawFrog(x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.ellipse(0, 0, 58, 48, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = `hsl(${targetHue}, 100%, 45%)`; ctx.beginPath(); ctx.ellipse(0, 5, 48, 40, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255, 100, 150, 0.4)'; ctx.beginPath(); ctx.arc(-25, 10, 8, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(25, 10, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-20, -25, 18, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(20, -25, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-20, -25, 10, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(20, -25, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-16, -29, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(24, -29, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = `hsl(${targetHue}, 100%, 20%)`; ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.arc(0, 5, 15, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
            ctx.restore();
        }
        window.onresize = resize;
    </script>
</body>
</html>
