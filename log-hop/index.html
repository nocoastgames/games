<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA LOG HOP</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00FF00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #start-btn {
            font-size: 50px; padding: 30px 60px; border: 8px solid #00FF00;
            background: transparent; color: #00FF00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #00FF00;
        }

        canvas { display: block; z-index: 10; }

        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            opacity: 0; z-index: 100; pointer-events: none;
        }

        h1 { color: #00FF00; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>

    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div id="start-btn">START HOP</div>
        <p style="margin-top: 20px; color: white;">(Wait for Log -> Press Switch)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>MEGA LOG HOP</h1>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        
        let audioCtx, isStarted = false;
        let lastPressTime = 0;
        const cooldown = 400;

        // Game State
        let frog = { x: 50, y: 0, targetX: 50, isJumping: false, jumpT: 0 };
        let logs = [];
        let riverLanes = 3;
        let laneWidth;
        let gameState = "play"; // play, win, lose

        // Particle/Effects
        let particles = [], ripples = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            resize();
            resetGame();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            laneWidth = (canvas.width - 200) / (riverLanes + 1);
            frog.y = canvas.height / 2;
        }

        function resetGame() {
            gameState = "play";
            frog.x = 80;
            frog.targetX = 80;
            frog.isJumping = false;
            logs = [];
            // Spawn initial logs
            for(let i=0; i<riverLanes; i++) {
                spawnLog(i);
            }
        }

        function spawnLog(lane) {
            logs.push({
                lane: lane,
                x: 150 + (lane * laneWidth),
                y: Math.random() * canvas.height,
                w: 120,
                h: 250,
                speed: 2 + Math.random() * 3,
                dir: Math.random() > 0.5 ? 1 : -1,
                color: `hsl(${lane * 60}, 100%, 50%)`
            });
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted || gameState !== "play" || frog.isJumping) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            jump();
        }

        function jump() {
            frog.isJumping = true;
            frog.jumpT = 0;
            frog.targetX = frog.x + laneWidth;
            playSynth('jump', 0.3);
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'jump') {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'splash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#050510'; // Dark blue river
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Banks
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 150, canvas.height); // Left
            ctx.fillRect(canvas.width - 150, 0, 150, canvas.height); // Right

            // Update Logs
            logs.forEach(log => {
                log.y += log.speed * log.dir;
                if (log.y > canvas.height + 100) log.y = -100;
                if (log.y < -100) log.y = canvas.height + 100;

                ctx.fillStyle = log.color;
                ctx.beginPath();
                ctx.roundRect(log.x - log.w/2, log.y - log.h/2, log.w, log.h, 20);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(log.x - log.w/2, log.y - log.h/2 + 10, log.w, 15);
            });

            // Update Frog Jump
            if (frog.isJumping) {
                frog.jumpT += 0.05;
                let jumpYOffset = Math.sin(frog.jumpT * Math.PI) * 100;
                let currentX = frog.x + (frog.targetX - frog.x) * frog.jumpT;
                drawFrog(currentX, frog.y - jumpYOffset);

                if (frog.jumpT >= 1) {
                    frog.x = frog.targetX;
                    frog.isJumping = false;
                    checkLanding();
                }
            } else {
                drawFrog(frog.x, frog.y);
            }

            // Draw Effects
            drawEffects();

            if (gameState === "lose") {
                ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                setTimeout(resetGame, 1000);
            }

            requestAnimationFrame(gameLoop);
        }

        function checkLanding() {
            // Did we hit the final bank?
            if (frog.x > canvas.width - 200) {
                gameState = "win";
                playSynth('win', 0.5);
                megaCelebration(frog.x, frog.y);
                setTimeout(resetGame, 3000);
                return;
            }

            // Are we on a log?
            let onLog = false;
            logs.forEach(log => {
                if (Math.abs(frog.x - log.x) < 50) {
                    if (frog.y > log.y - log.h/2 && frog.y < log.y + log.h/2) {
                        onLog = true;
                    }
                }
            });

            if (!onLog) {
                gameState = "lose";
                playSynth('splash', 0.5);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else {
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        function drawFrog(x, y) {
            ctx.fillStyle = '#00FF00';
            ctx.shadowBlur = 20; ctx.shadowColor = "#00FF00";
            ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // Eyes
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(x-12, y-10, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+12, y-10, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-12, y-10, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+12, y-10, 4, 0, Math.PI*2); ctx.fill();
        }

        function megaCelebration(x, y) {
            flash.style.backgroundColor = "white";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 400);

            for(let i=0; i<8; i++) {
                lasers.push({x: x, y: y, angle: (i * 45) * Math.PI/180, life: 1});
            }
            for(let i=0; i<20; i++) {
                particles.push({
                    x: x, y: y, 
                    vx: (Math.random()-0.5) * 20, vy: (Math.random()-0.5) * 20, 
                    life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`
                });
            }
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(0, 255, 255, ${l.life})`;
                ctx.lineWidth = 15 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000);
                ctx.stroke();
                l.life -= 0.02;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            });
            lasers = lasers.filter(l => l.life > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }

        window.onresize = resize;
    </script>
</body>
</html>
