<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA LOG HOP - RIVER JOURNEY</title>
    <style>
        body { 
            background-color: #000; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif;
            user-select: none; touch-action: manipulation;
        }

        #home-button {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            color: white; text-decoration: none; font-size: 24px;
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.3; transition: opacity 0.3s;
        }
        #home-button:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.3); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #FF8C00; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center;
        }
        #start-btn {
            font-size: 50px; padding: 30px 60px; border: 8px solid #FF8C00;
            background: transparent; color: #FF8C00; font-weight: bold;
            border-radius: 20px; box-shadow: 0 0 30px #FF8C00;
        }

        canvas { display: block; z-index: 10; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0; z-index: 100; pointer-events: none; }
        h1 { color: #FF8C00; position: absolute; bottom: 20px; letter-spacing: 5px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body onmousedown="handleInput(event)" onkeydown="handleInput(event)">

    <a id="home-button" href="../index.html">🏠</a>
    <div id="flash"></div>

    <div id="overlay" onclick="startEngine()">
        <div id="start-btn">START RIVER HOP</div>
        <p style="margin-top: 20px; color: white; font-size: 20px;">(Jump across lanes and safe sandbars!)</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <h1>RIVER JOURNEY</h1>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        
        let audioCtx, isStarted = false;
        let lastPressTime = 0;
        const cooldown = 300;

        // --- GAME CONFIGURATION ---
        let riverLanes = 3;
        let steps = []; // Stores the X position of every bank, lane, and sandbar
        let frog = { stepIdx: 0, y: 0, targetX: 0, isJumping: false, jumpT: 0 };
        let logs = [];
        let gameState = "play";
        let bankWidth = 180;
        let sandbarWidth = 80;
        let laneWidth;

        // Particles
        let particles = [], lasers = [];

        function startEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            resize();
            resetGame();
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            frog.y = canvas.height / 2;

            // Calculate Grid: BankL -> Lane1 -> Bar1 -> Lane2 -> Bar2 -> Lane3 -> BankR
            steps = [];
            steps.push({ type: 'bank', x: bankWidth/2 }); // Start Bank
            
            let remainingWidth = canvas.width - (bankWidth * 2);
            laneWidth = (remainingWidth - (sandbarWidth * (riverLanes-1))) / riverLanes;

            let currentX = bankWidth;
            for(let i=0; i<riverLanes; i++) {
                steps.push({ type: 'lane', x: currentX + laneWidth/2, laneIdx: i });
                currentX += laneWidth;
                if (i < riverLanes - 1) {
                    steps.push({ type: 'sandbar', x: currentX + sandbarWidth/2 });
                    currentX += sandbarWidth;
                }
            }
            steps.push({ type: 'bank', x: canvas.width - bankWidth/2 }); // Goal Bank
        }

        function resetGame() {
            gameState = "play";
            frog.stepIdx = 0;
            frog.x = steps[0].x;
            frog.isJumping = false;
            logs = [];
            for(let i=0; i<riverLanes; i++) {
                spawnLog(i);
            }
        }

        function spawnLog(laneIdx) {
            logs.push({
                laneIdx: laneIdx,
                y: Math.random() * canvas.height,
                w: laneWidth * 0.8,
                h: canvas.height * 0.45, // --- LONGER LOGS ---
                speed: 1.2 + Math.random() * 1.5, // --- SLOWER LOGS ---
                dir: Math.random() > 0.5 ? 1 : -1,
                color: `hsl(${30 + laneIdx * 40}, 100%, 50%)`
            });
        }

        function handleInput(event) {
            if (event.target.id === 'home-button') return;
            if (!isStarted || gameState !== "play" || frog.isJumping) return;
            if (event.type === 'keydown' && event.code !== "Space" && event.code !== "Enter") return;

            const now = Date.now();
            if (now - lastPressTime < cooldown) return;
            lastPressTime = now;

            jump();
        }

        function jump() {
            frog.isJumping = true;
            frog.jumpT = 0;
            frog.oldX = frog.x;
            frog.stepIdx++;
            frog.targetX = steps[frog.stepIdx].x;
            playSynth('jump', 0.2);
        }

        function playSynth(type, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'jump') {
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'splash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(); osc.stop(now + 0.4);
            } else if (type === 'win') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(); osc.stop(now + 0.6);
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#050515';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Banks and Sandbars
            steps.forEach(step => {
                if (step.type === 'bank') {
                    ctx.fillStyle = '#333'; // Dark Stone
                    ctx.fillRect(step.x - bankWidth/2, 0, bankWidth, canvas.height);
                    ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
                    ctx.strokeRect(step.x - bankWidth/2, 0, bankWidth, canvas.height);
                } else if (step.type === 'sandbar') {
                    ctx.fillStyle = 'rgba(255, 140, 0, 0.2)'; // Glowing Sand
                    ctx.fillRect(step.x - sandbarWidth/2, 0, sandbarWidth, canvas.height);
                    ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 2;
                    ctx.strokeRect(step.x - sandbarWidth/2, 0, sandbarWidth, canvas.height);
                }
            });

            // Update & Draw Logs
            logs.forEach(log => {
                log.y += log.speed * log.dir;
                if (log.y > canvas.height + log.h) log.y = -log.h;
                if (log.y < -log.h) log.y = canvas.height + log.h;

                let laneX = steps.find(s => s.laneIdx === log.laneIdx).x;
                ctx.fillStyle = log.color;
                ctx.beginPath();
                ctx.roundRect(laneX - log.w/2, log.y, log.w, log.h, 25);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(laneX - log.w/2, log.y + 20, log.w, 20);
            });

            // Update Frog
            if (frog.isJumping) {
                frog.jumpT += 0.06;
                let arc = Math.sin(frog.jumpT * Math.PI) * 120;
                frog.x = frog.oldX + (frog.targetX - frog.oldX) * frog.jumpT;
                drawFrog(frog.x, frog.y - arc);

                if (frog.jumpT >= 1) {
                    frog.x = frog.targetX;
                    frog.isJumping = false;
                    checkLanding();
                }
            } else {
                drawFrog(frog.x, frog.y);
            }

            drawEffects();

            if (gameState === "lose") {
                ctx.fillStyle = "rgba(255, 0, 0, 0.4)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                setTimeout(resetGame, 1000);
            }

            requestAnimationFrame(gameLoop);
        }

        function checkLanding() {
            let currentStep = steps[frog.stepIdx];

            if (currentStep.type === 'bank' && frog.stepIdx > 0) {
                gameState = "win";
                playSynth('win', 0.5);
                megaCelebration(frog.x, frog.y);
                setTimeout(resetGame, 3500);
                return;
            }

            if (currentStep.type === 'lane') {
                let log = logs.find(l => l.laneIdx === currentStep.laneIdx);
                // Check if frog Y is within log Y range
                if (frog.y < log.y || frog.y > log.y + log.h) {
                    gameState = "lose";
                    playSynth('splash', 0.5);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } else {
                    if (navigator.vibrate) navigator.vibrate(60);
                }
            }
        }

        function drawFrog(x, y) {
            ctx.fillStyle = '#00FF00';
            ctx.shadowBlur = 20; ctx.shadowColor = "#00FF00";
            ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(x-15, y-10, 10, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+15, y-10, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-15, y-10, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+15, y-10, 5, 0, Math.PI*2); ctx.fill();
        }

        function megaCelebration(x, y) {
            flash.style.backgroundColor = "white";
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 400);
            for(let i=0; i<10; i++) {
                lasers.push({x: x, y: y, angle: (i * 36) * Math.PI/180, life: 1});
            }
            for(let i=0; i<30; i++) {
                particles.push({
                    x: x, y: y, 
                    vx: (Math.random()-0.5) * 25, vy: (Math.random()-0.5) * 25, 
                    life: 1, color: `hsl(${Math.random()*360}, 100%, 50%)`
                });
            }
        }

        function drawEffects() {
            lasers.forEach(l => {
                ctx.strokeStyle = `rgba(0, 255, 255, ${l.life})`;
                ctx.lineWidth = 20 * l.life;
                ctx.beginPath(); ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + Math.cos(l.angle) * 2000, l.y + Math.sin(l.angle) * 2000);
                ctx.stroke();
                l.life -= 0.015;
            });
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.015;
            });
            lasers = lasers.filter(l => l.life > 0);
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }

        window.onresize = resize;
    </script>
</body>
</html>
